<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Results · Shipeasy</title>
<meta name="viewport" content="width=1440"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css?v=4">
<link rel="stylesheet" href="forms.css?v=1">
<link rel="stylesheet" href="shipeasy-experiments.css?v=2">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  /* ─────────────────────────────────────────────────────
     v2 — answer-first results page
     Goal: at-a-glance = verdict + one CI bar + scoreboard.
     Everything else is on-demand.
     ───────────────────────────────────────────────────── */

  /* Local color tune-up — lifts mid-greys for readability while
     keeping the same overall warm-dark palette.
     This shadows the global tokens for this page only. */
  body{
    --fg-2: rgba(245,245,244,0.82);
    --fg-3: rgba(245,245,244,0.60);
    --fg-4: rgba(245,245,244,0.40);
    --line: rgba(255,255,255,0.07);
    --line-2: rgba(255,255,255,0.13);
  }

  /* Default: nothing wraps. Components that *should* wrap
     (the verdict 'why' paragraph, checklist content) opt in explicitly. */
  .v2-page, .v2-page * { white-space: nowrap; }
  .v2-page .allow-wrap,
  .v2-page p.why,
  .v2-page .checklist-foot ul,
  .v2-page .srm-strip .why,
  .v2-page .config-grid .kv .v { white-space: normal; }

  .v2-page{padding:0;max-width:none;background:var(--bg);min-height:calc(100vh - 52px)}

  /* ── Embedded mode (rendered inside another page) ──────────────
     Hide chrome, fill the iframe height fully. */
  body.embedded .app{grid-template-columns:1fr}
  body.embedded .v2-page{min-height:100vh}

  /* ── Layout: full-width banner row + main + foldable meta ─────
     Grid template areas put the experiment header / goal /
     stopped-banner across the FULL width at the top; below that,
     main content sits on the left and the meta rail starts under
     the banner — so the rail no longer crowds the page title. */
  .v2-shell{display:grid;grid-template-columns:minmax(0,1fr) 320px;
    grid-template-areas:
      "banner banner"
      "main meta";
    gap:0;align-items:start;min-height:calc(100vh - 52px);
    transition:grid-template-columns .25s cubic-bezier(.2,.7,.3,1)}
  .v2-shell.collapsed{grid-template-columns:minmax(0,1fr) 40px}
  .v2-banner{grid-area:banner;padding:18px 24px 0;width:100%;
    box-sizing:border-box;background:var(--bg);min-width:0}
  .v2-main-col{grid-area:main;padding:18px 24px 64px;max-width:1140px;
    min-width:0;justify-self:start;width:100%}

  /* ── Meta rail ───────────────────────────────────── */
  .v2-meta{grid-area:meta;position:sticky;top:52px;height:calc(100vh - 52px);
    border-left:1px solid var(--line);background:var(--bg-1);
    display:flex;flex-direction:column;overflow:hidden;
    transition:width .25s cubic-bezier(.2,.7,.3,1)}
  /* In embedded mode there's no Topbar; sticky-top becomes 0 */
  body.embedded .v2-meta{top:0;height:100vh}
  .v2-meta-head{display:flex;align-items:center;gap:10px;padding:11px 14px;
    border-bottom:1px solid var(--line);background:var(--bg-1);flex-shrink:0;min-height:40px}
  .v2-meta-head .t{font-family:var(--mono);font-size:10px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--fg-2);font-weight:500}
  .v2-meta-head .meta-fold{margin-left:auto;background:none;border:1px solid var(--line);
    color:var(--fg-3);cursor:default;padding:0;border-radius:4px;display:grid;
    place-items:center;width:22px;height:22px;transition:background .12s,color .12s}
  .v2-meta-head .meta-fold:hover{background:var(--bg-2);color:var(--fg)}
  .v2-meta-body{flex:1;overflow-y:auto;overflow-x:hidden;
    scrollbar-width:thin;scrollbar-color:var(--line-2) transparent}
  .v2-meta-body::-webkit-scrollbar{width:6px}
  .v2-meta-body::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}

  /* collapsed = thin vertical rail */
  .v2-meta.collapsed{cursor:default}
  .v2-meta.collapsed .v2-meta-head{padding:11px 8px;justify-content:center}
  .v2-meta.collapsed .v2-meta-head .t,
  .v2-meta.collapsed .v2-meta-body{display:none}
  .v2-meta.collapsed .v2-meta-head{flex-direction:column;height:100%;gap:12px;
    border-bottom:none;align-items:center}
  .v2-meta.collapsed .v2-meta-head .meta-fold{margin-left:0}
  .v2-meta.collapsed .v2-rail-label{writing-mode:vertical-rl;transform:rotate(180deg);
    font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--fg-3);user-select:none}

  /* Section (collapsible) */
  .v2-meta-section{border-bottom:1px solid var(--line)}
  .v2-meta-section:last-child{border-bottom:none}
  .v2-meta-section > summary{cursor:default;list-style:none;padding:9px 14px;
    display:flex;align-items:center;gap:8px;color:var(--fg-2);font-size:12px;
    font-weight:500;transition:background .12s,color .12s}
  .v2-meta-section > summary::-webkit-details-marker{display:none}
  .v2-meta-section > summary:hover{background:var(--bg-2);color:var(--fg)}
  .v2-meta-section > summary .chev{margin-left:auto;color:var(--fg-3);
    transition:transform .15s;flex-shrink:0}
  .v2-meta-section[open] > summary .chev{transform:rotate(90deg)}
  .v2-meta-section[open] > summary{color:var(--fg);background:var(--bg-2)}
  .v2-meta-section > summary .ico{color:var(--fg-3);flex-shrink:0}
  .v2-meta-section[open] > summary .ico{color:var(--fg-2)}
  .v2-meta-section .meta-body{padding:6px 14px 12px}

  /* compact kv list */
  .meta-kv{display:flex;justify-content:space-between;align-items:baseline;
    padding:4px 0;gap:12px;font-size:11.5px;line-height:1.5}
  .meta-kv + .meta-kv{border-top:1px dashed var(--line)}
  .meta-kv .k{color:var(--fg-3);font-size:11px;flex-shrink:0}
  .meta-kv .v{font-family:var(--mono);font-size:10.5px;color:var(--fg);
    text-align:right;font-variant-numeric:tabular-nums;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%}
  .meta-kv .v.wrap{white-space:normal;font-family:var(--sans);font-size:11.5px;
    color:var(--fg-2);text-align:left;line-height:1.45;max-width:100%}

  /* owner / person rows */
  .meta-person{display:flex;align-items:center;gap:9px;padding:5px 0}
  .meta-person + .meta-person{border-top:1px dashed var(--line)}
  .meta-person .info{flex:1;min-width:0}
  .meta-person .info .n{font-size:12px;color:var(--fg);font-weight:500;
    text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
  .meta-person .info .r{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--fg-3);margin-top:2px}
  .meta-person .ago{font-family:var(--mono);font-size:9.5px;color:var(--fg-3)}

  /* lifecycle timeline */
  .meta-timeline{position:relative;padding:8px 0 4px}
  .meta-timeline::before{content:"";position:absolute;left:6px;top:12px;bottom:12px;
    width:1px;background:var(--line)}
  .meta-tl-item{display:flex;gap:12px;padding:5px 0;position:relative}
  .meta-tl-item .dot{width:11px;height:11px;border-radius:50%;background:var(--bg-1);
    border:2px solid var(--line-2);flex-shrink:0;margin-top:2px;z-index:1;position:relative}
  .meta-tl-item.now .dot{background:var(--accent);border-color:var(--accent);
    box-shadow:0 0 0 3px color-mix(in oklab,var(--accent) 28%,transparent)}
  .meta-tl-item.done .dot{background:var(--fg-2);border-color:var(--fg-2)}
  .meta-tl-item.future .dot{border-style:dashed}
  .meta-tl-item .label{flex:1;min-width:0;overflow:hidden}
  .meta-tl-item .label .l{font-size:11.5px;color:var(--fg);font-weight:500;
    overflow:hidden;text-overflow:ellipsis}
  .meta-tl-item.future .label .l{color:var(--fg-3);font-weight:400}
  .meta-tl-item .label .s{font-family:var(--mono);font-size:9.5px;color:var(--fg-3);margin-top:2px;
    overflow:hidden;text-overflow:ellipsis}

  /* variants */
  .meta-variant{padding:7px 0;display:flex;flex-direction:column;gap:5px}
  .meta-variant + .meta-variant{border-top:1px dashed var(--line)}
  .meta-variant .top{display:flex;align-items:baseline;gap:8px;min-width:0}
  .meta-variant .top .n{font-family:var(--mono);font-size:11.5px;color:var(--fg);font-weight:500;
    overflow:hidden;text-overflow:ellipsis;min-width:0}
  .meta-variant .top .n .ctrl-tag{font-size:9px;color:var(--fg-3);margin-left:6px;
    letter-spacing:.04em;text-transform:uppercase}
  .meta-variant .top .pct{margin-left:auto;font-family:var(--mono);font-size:10.5px;
    color:var(--fg-2);font-variant-numeric:tabular-nums;flex-shrink:0}
  .meta-variant .bar{height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden}
  .meta-variant .bar > span{display:block;height:100%}
  .meta-variant.ctrl .bar > span{background:var(--fg-3)}
  .meta-variant.test .bar > span{background:var(--accent)}

  /* metric list (goal/guards) */
  .meta-metric{padding:6px 0;display:flex;align-items:center;gap:8px;font-size:11.5px;
    min-width:0}
  .meta-metric + .meta-metric{border-top:1px dashed var(--line)}
  .meta-metric .ico{flex-shrink:0}
  .meta-metric .n{font-family:var(--mono);font-size:10.5px;color:var(--fg);
    text-overflow:ellipsis;overflow:hidden;white-space:nowrap;flex:1;min-width:0}
  .meta-metric .agg{font-family:var(--mono);font-size:9px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--fg-3);flex-shrink:0}

  /* activity feed */
  .meta-activity{padding:4px 0}
  .meta-activity-item{display:grid;grid-template-columns:18px 1fr;gap:10px;
    padding:6px 0;font-size:11.5px;align-items:start;min-width:0}
  .meta-activity-item + .meta-activity-item{border-top:1px dashed var(--line)}
  .meta-activity-item .av{width:18px;height:18px;border-radius:50%;font-size:9px;
    color:#fff;display:grid;place-items:center;font-family:var(--mono);font-weight:600;
    margin-top:1px}
  .meta-activity-item.bot .av{background:var(--accent);color:var(--accent-fg)}
  .meta-activity-item .what{color:var(--fg-2);line-height:1.45;font-size:11px}
  .meta-activity-item .what b{color:var(--fg);font-weight:500}
  .meta-activity-item .when{font-family:var(--mono);font-size:9.5px;color:var(--fg-3);
    margin-top:2px;letter-spacing:.04em}

  /* linked refs */
  .meta-link{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:11.5px;
    color:var(--fg-2);transition:color .12s;cursor:default;min-width:0}
  .meta-link + .meta-link{border-top:1px dashed var(--line)}
  .meta-link:hover{color:var(--fg)}
  .meta-link .ico{color:var(--fg-3);flex-shrink:0}
  .meta-link .label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .meta-link .label .sub{display:block;font-family:var(--mono);font-size:9px;
    color:var(--fg-3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;
    overflow:hidden;text-overflow:ellipsis}
  .meta-link .ext{color:var(--fg-3);font-size:10px}

  /* tag row */
  .meta-tags{display:flex;flex-wrap:wrap;gap:5px;padding:4px 0}
  .meta-tags .mtag{font-family:var(--mono);font-size:9.5px;letter-spacing:.02em;
    padding:2px 6px;background:var(--bg-3);color:var(--fg-2);
    border:1px solid var(--line);border-radius:3px}

  /* ── 1. Compact header ────────────────────────────── */
  .v2-head{display:flex;align-items:center;gap:12px;padding:0 0 12px;min-width:0}
  .v2-head h1{margin:0;font-size:19px;font-weight:500;letter-spacing:-0.02em;
    line-height:1.2;color:var(--fg);overflow:hidden;text-overflow:ellipsis;min-width:0}

  /* Goal / Success — directly under the title, no card chrome */
  .v2-criteria{display:flex;flex-direction:column;gap:4px;
    margin:0 0 16px;padding:0 0 0 10px;
    border-left:2px solid color-mix(in oklab,var(--accent) 70%,transparent)}
  .v2-criteria .row{display:flex;gap:10px;align-items:baseline;
    font-size:12px;line-height:1.5;color:var(--fg);max-width:96ch;min-width:0}
  .v2-criteria .row > span:last-child{flex:1;min-width:0;
    overflow:hidden;text-overflow:ellipsis}
  .v2-criteria .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--fg-3);flex-shrink:0;
    width:50px;padding-top:1px}
  .v2-criteria .row.goal .lbl{color:var(--accent)}
  .v2-criteria .row.success{color:var(--fg-2)}
  .v2-criteria .row strong{color:var(--fg);font-weight:500}
  .v2-head .owner{display:flex;align-items:center;gap:8px;color:var(--fg-2);
    font-size:12px;margin-left:auto;padding-right:8px;flex-shrink:0}
  .v2-head .more-actions{display:flex;gap:4px;flex-shrink:0}

  /* ── 2. Hero ──────────────────────────────────────── */
  .v2-hero{display:grid;grid-template-columns:1fr 1.15fr;gap:0;
    border:1px solid;border-radius:10px;overflow:hidden;
    background:var(--bg-1);margin-bottom:18px}
  .v2-hero.ship{border-color:color-mix(in oklab,var(--accent) 32%,transparent)}
  .v2-hero.hold{border-color:color-mix(in oklab,var(--danger) 32%,transparent)}
  .v2-hero.wait{border-color:color-mix(in oklab,var(--warn) 32%,transparent)}
  .v2-hero.invalid{border-color:color-mix(in oklab,var(--purple) 32%,transparent)}

  /* hero LEFT — verdict */
  .v2-hero .left{padding:22px 24px;display:flex;flex-direction:column;gap:10px;
    min-width:0;position:relative;overflow:hidden}
  .v2-hero.ship .left{background:
    linear-gradient(135deg,color-mix(in oklab,var(--accent) 14%, var(--bg-1)) 0%,var(--bg-1) 75%)}
  .v2-hero.hold .left{background:
    linear-gradient(135deg,color-mix(in oklab,var(--danger) 14%, var(--bg-1)) 0%,var(--bg-1) 75%)}
  .v2-hero.wait .left{background:
    linear-gradient(135deg,color-mix(in oklab,var(--warn) 14%, var(--bg-1)) 0%,var(--bg-1) 75%)}
  .v2-hero.invalid .left{background:
    linear-gradient(135deg,color-mix(in oklab,var(--purple) 14%, var(--bg-1)) 0%,var(--bg-1) 75%)}

  .v2-hero .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.10em;
    text-transform:uppercase;color:var(--fg-3);display:flex;align-items:center;gap:8px}
  .v2-hero .eyebrow .ico{margin-right:-2px}
  .v2-hero.ship .eyebrow .ico{color:var(--accent)}
  .v2-hero.hold .eyebrow .ico{color:var(--danger)}
  .v2-hero.wait .eyebrow .ico{color:var(--warn)}
  .v2-hero.invalid .eyebrow .ico{color:var(--purple)}

  .v2-hero .title{font-size:26px;font-weight:400;letter-spacing:-0.025em;line-height:1.05;
    font-family:var(--serif);font-style:italic;margin:0;
    overflow:hidden;text-overflow:ellipsis}
  .v2-hero.ship .title{color:var(--accent)}
  .v2-hero.hold .title{color:var(--danger)}
  .v2-hero.wait .title{color:var(--warn)}
  .v2-hero.invalid .title{color:var(--purple)}

  .v2-hero .why{margin:0;color:var(--fg-2);font-size:12.5px;line-height:1.55;
    width:100%;max-width:42ch;text-wrap:pretty;white-space:normal;
    overflow:hidden}
  .v2-hero .why strong{color:var(--fg);font-weight:500}

  .v2-hero .runtime{margin-top:auto;padding-top:14px;display:flex;gap:12px;
    align-items:center;color:var(--fg-3);font-family:var(--mono);font-size:10px;
    letter-spacing:.05em;text-transform:uppercase;
    overflow:hidden;text-overflow:ellipsis}
  .v2-hero .runtime .dot{width:3px;height:3px;border-radius:50%;background:var(--fg-4);flex-shrink:0}

  /* hero RIGHT — evidence */
  .v2-hero .right{padding:22px 24px;background:var(--bg-2);
    border-left:1px solid var(--line);display:flex;flex-direction:column;gap:14px;
    min-width:0}
  .v2-hero .right .metric-name{font-family:var(--mono);font-size:11.5px;color:var(--fg-2);
    display:flex;align-items:center;gap:8px;
    overflow:hidden;text-overflow:ellipsis}
  .v2-hero .right .metric-name .tag{font-family:var(--mono);font-size:9.5px;
    padding:1px 6px;background:var(--bg-3);border:1px solid var(--line);
    border-radius:3px;color:var(--fg-3);letter-spacing:.04em;text-transform:uppercase}

  /* number lines */
  .v2-stats{display:flex;flex-direction:column;gap:0}
  .v2-stat-line{display:grid;grid-template-columns:78px 1fr 90px;gap:12px;
    align-items:baseline;padding:6px 0;border-bottom:1px solid var(--line);
    font-family:var(--mono);font-variant-numeric:tabular-nums}
  .v2-stat-line:last-child{border-bottom:none;padding-bottom:0}
  .v2-stat-line .k{font-size:10.5px;color:var(--fg-3);
    letter-spacing:.04em;display:flex;align-items:center;gap:7px;
    overflow:hidden;text-overflow:ellipsis}
  .v2-stat-line .k .sw{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .v2-stat-line .v{font-size:13px;color:var(--fg);font-weight:500;text-align:right}
  .v2-stat-line .sub{font-size:10px;color:var(--fg-4);text-align:right}
  .v2-stat-line.delta .v{font-size:16px}
  .v2-stat-line.delta.pos .v{color:var(--accent)}
  .v2-stat-line.delta.neg .v{color:var(--danger)}
  .v2-stat-line.p .v.sig{color:var(--accent)}

  /* big CI bar */
  .ci-zone{padding:4px 0 0}
  .ci-zone .cap{display:flex;justify-content:space-between;
    font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--fg-3);margin-bottom:12px}
  .big-ci{position:relative;height:48px;padding:0 4px}
  .big-ci .scale{position:absolute;top:50%;left:4px;right:4px;height:1px;
    background:var(--line)}
  .big-ci .tick{position:absolute;top:calc(50% - 4px);height:8px;width:1px;
    background:var(--line)}
  .big-ci .tick.zero{background:var(--fg-3);height:16px;top:calc(50% - 8px)}
  .big-ci .tick-label{position:absolute;top:calc(50% + 12px);
    font-family:var(--mono);font-size:10px;color:var(--fg-4);
    transform:translateX(-50%);font-variant-numeric:tabular-nums}
  .big-ci .band{position:absolute;top:50%;height:16px;border-radius:8px;
    transform:translateY(-50%)}
  .big-ci .band.pos{background:color-mix(in oklab,var(--accent) 30%,transparent);
    border:1px solid color-mix(in oklab,var(--accent) 55%,transparent)}
  .big-ci .band.neg{background:color-mix(in oklab,var(--danger) 30%,transparent);
    border:1px solid color-mix(in oklab,var(--danger) 55%,transparent)}
  .big-ci .band.zero-cross{background:color-mix(in oklab,var(--warn) 18%,transparent);
    border:1px solid color-mix(in oklab,var(--warn) 42%,transparent)}
  .big-ci .point{position:absolute;top:50%;width:3px;height:22px;
    transform:translate(-50%,-50%);background:var(--fg);border-radius:1.5px;
    box-shadow:0 0 0 3px var(--bg-2)}
  .big-ci .end-l,.big-ci .end-r{position:absolute;top:calc(50% - 20px);
    font-family:var(--mono);font-size:10px;color:var(--fg-2);
    font-variant-numeric:tabular-nums;font-weight:500}
  .big-ci .end-l{transform:translateX(-100%);padding-right:6px}
  .big-ci .end-r{padding-left:6px}

  /* ── 3. Scoreboard ────────────────────────────────── */
  .v2-board{border:1px solid var(--line);border-radius:10px;
    background:var(--bg-1);overflow:hidden;margin-bottom:18px}
  .v2-board-section + .v2-board-section{border-top:1px solid var(--line)}
  .v2-board-header{display:flex;align-items:center;gap:10px;padding:9px 18px;
    background:var(--bg-2);border-bottom:1px solid var(--line)}
  .v2-board-header .kind{font-family:var(--mono);font-size:10.5px;
    letter-spacing:.05em;text-transform:uppercase;color:var(--fg-2);font-weight:500}
  .v2-board-header .summary{font-family:var(--mono);font-size:10.5px;

const EXP_META = {

const fmtPct = (x, f=1) => (x*100).toFixed(f) + '%';
const fmtP = p => p < 0.001 ? '<0.001' : p.toFixed(3);
const renderMd = (s) => s.split(/(\*\*[^*]+\*\*)/g).map((part,i) =>
  part.startsWith('**') ? <strong key={i}>{part.slice(2,-2)}</strong> : <span key={i}>{part}</span>
);

/* ── Big CI bar (in hero) ────────────────────────── */
function BigCIBar({ delta, ci, range=[-0.10,+0.12], lowerBetter=false }) {
  const [rl, rh] = range;
  const pad = 4;
  const map = v => ((v-rl)/(rh-rl))*100;
  const left = Math.max(0, Math.min(100, map(ci[0])));
  const right = Math.max(0, Math.min(100, map(ci[1])));
  const zero = map(0);
  const pt = map(delta);
  let cls = 'zero-cross';
  if (ci[0] > 0) cls = lowerBetter ? 'neg' : 'pos';
  else if (ci[1] < 0) cls = lowerBetter ? 'pos' : 'neg';
  const ticks = [-0.10,-0.05,0,0.05,0.10];
  const px = pct => `calc(${pad}px + ${pct}% * (100% - ${pad*2}px) / 100%)`;
  return (
    <div className="big-ci">
      <div className="scale"/>
      {ticks.map(t => (
        <React.Fragment key={t}>
          <span className={`tick ${t===0?'zero':''}`} style={{left:px(map(t))}}/>
          <span className="tick-label" style={{left:px(map(t))}}>
            {t===0?'0':`${t>0?'+':''}${(t*100).toFixed(0)}%`}
          </span>
        </React.Fragment>
      ))}
      <div className={`band ${cls}`} style={{
        left:px(left), width:`calc(${right-left}% * (100% - ${pad*2}px) / 100%)`,
      }}/>
      <div className="point" style={{left:px(pt)}}/>
      <span className="end-l" style={{left:px(left)}}>{fmtPct(ci[0],1)}</span>
      <span className="end-r" style={{left:px(right)}}>{fmtPct(ci[1],1)}</span>
    </div>
  );
}

/* ── Mini CI bar (scoreboard) ─ shared range = -15 to +15 */
function MiniCIBar({ delta, ci, lowerBetter=false }) {
  const range = [-0.20, +0.20];
  const map = v => ((v-range[0])/(range[1]-range[0]))*100;
  const left = Math.max(0, Math.min(100, map(ci[0])));
  const right = Math.max(0, Math.min(100, map(ci[1])));
  const zero = map(0);
  const pt = Math.max(0, Math.min(100, map(delta)));
  let cls = 'zero-cross';
  if (ci[0] > 0) cls = lowerBetter ? 'neg' : 'pos';
  else if (ci[1] < 0) cls = lowerBetter ? 'pos' : 'neg';
  return (
    <div className="mini-ci">
      <div className="axis"/>
      <div className="zero" style={{left:`${zero}%`}}/>
      <div className={`band ${cls}`} style={{left:`${left}%`,width:`${right-left}%`}}/>
      <div className="point" style={{left:`${pt}%`}}/>
    </div>
  );
}

/* ── Scoreboard row ─────────────────────────────── */
function Row({ m, kind }) {
  const isPos = m.ci[0] > 0;
  const isNeg = m.ci[1] < 0;
  const goodChange = m.lowerBetter ? isNeg : isPos;
  const regressed = kind === 'guard' && m.pass === false;

  let StatusIcon;
  if (regressed) StatusIcon = <IconAlert size={13} style={{color:'var(--danger)'}}/>;
  else if (m.sig && goodChange) StatusIcon = <IconCheck size={13} style={{color:'var(--accent)'}}/>;
  else if (m.sig && !goodChange) StatusIcon = <IconAlert size={13} style={{color:'var(--danger)'}}/>;
  else StatusIcon = <span style={{width:5,height:5,borderRadius:50,background:'var(--fg-4)',display:'block'}}/>;

  const deltaClass = goodChange ? 'pos' : (isPos||isNeg) ? 'neg' : 'zero';

  return (
    <div className={`v2-row ${regressed?'regressed':''}`}>
      <span className="status">{StatusIcon}</span>
      <span className="name">
        <span className="n">
          {m.name}
          {m.lowerBetter && <span className="lower">lower is better</span>}
        </span>
      </span>
      <span className={`delta ${deltaClass}`}>
        {m.delta>0?'+':''}{fmtPct(m.delta,1)}
      </span>
      <MiniCIBar delta={m.delta} ci={m.ci} lowerBetter={m.lowerBetter}/>
      <span className="p">p={fmtP(m.p)}</span>
    </div>
  );
}

/* ── Time series ────────────────────────────────── */
function TimeSeriesV2({ mode, peekUntil=null, stoppedAt=null }) {
  const W=720, H=160; const days = 14;
  let ctrl, treat;
  if (mode === 'positive') {
    ctrl  = [.498,.501,.499,.503,.500,.502,.499,.501,.498,.500,.502,.498,.501,.499];
    treat = [.498,.503,.508,.512,.518,.526,.531,.534,.538,.540,.541,.542,.541,.542];
  } else if (mode === 'regression') {
    ctrl  = [.500,.498,.502,.500,.501,.499,.502,.498,.501,.500,.499,.501,.502,.498];
    treat = [.500,.510,.520,.524,.530,.532,.536,.534,.538,.540,.542,.541,.539,.540];
  } else if (mode === 'noisy') {
    ctrl  = [.218,.220,.215,.221,.219,.217,.221,.218,.222,.215,.219,.221,.218,.220];
    treat = [.218,.224,.219,.226,.220,.225,.221,.229,.224,.226,.228,.224,.226,.222];
  } else if (mode === 'broken') {
    ctrl  = [.500,.501,.498,.502,.503,.500,.499,.501,.502,.498,.500,.501,.500,.499];
    treat = [.500,.510,.580,.620,.640,.660,.660,.670,.668,.672,.670,.671,.670,.669];
  }
  const lo = mode==='noisy'?.20:mode==='broken'?.45:.45;
  const hi = mode==='noisy'?.24:mode==='broken'?.72:.58;
  const xs = i => (i/(days-1))*W;
  const ys = v => H - ((v-lo)/(hi-lo))*(H-12) - 6;
  const mkPath = pts => pts.map((v,i)=>`${i===0?'M':'L'}${xs(i).toFixed(1)},${ys(v).toFixed(1)}`).join(' ');
  return (
    <div className="ts-chart-v2">
      <div className="yax">
        {[hi,(hi+lo)/2,lo].map((v,i)=><div key={i}>{(v*100).toFixed(1)}%</div>)}
      </div>
      <div className="legend">
        <span><span className="sw" style={{background:'var(--fg-3)'}}/>control</span>
        <span><span className="sw" style={{background:'var(--accent)'}}/>treatment</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        {[0,1,2,3].map(i => (
          <line key={i} x1="0" x2={W} y1={H*i/3} y2={H*i/3}
            stroke="var(--line)" strokeDasharray="2 4"/>
        ))}
        {peekUntil && (
          <rect x="0" y="0" width={xs(peekUntil)} height={H}
            fill="color-mix(in oklab, var(--warn) 10%, transparent)"/>
        )}
        {peekUntil && (
          <text x={xs(peekUntil)/2} y="14" textAnchor="middle"
            fontFamily="var(--mono)" fontSize="9" fill="var(--warn)" letterSpacing=".06em">
            BEFORE MIN_RUNTIME · PEEK WARNING
          </text>
        )}
        {stoppedAt && (
          <>
            <line x1={xs(stoppedAt)} x2={xs(stoppedAt)} y1={0} y2={H}
              stroke="var(--info)" strokeWidth="1.2"/>
            <text x={xs(stoppedAt)-4} y={12} textAnchor="end"
              fontFamily="var(--mono)" fontSize="9" fill="var(--info)">stopped_at</text>
          </>
        )}
        <path d={mkPath(ctrl)} fill="none" stroke="var(--fg-3)" strokeWidth="1.5" strokeDasharray="4 3"/>
        <path d={mkPath(treat)} fill="none" stroke="var(--accent)" strokeWidth="1.8"/>
        <circle cx={xs(days-1)} cy={ys(ctrl[days-1])} r="3" fill="var(--fg-3)" stroke="var(--bg-1)" strokeWidth="2"/>
        <circle cx={xs(days-1)} cy={ys(treat[days-1])} r="3.5" fill="var(--accent)" stroke="var(--bg-1)" strokeWidth="2"/>
      </svg>
      <div className="xax">
        {['May 08','May 11','May 14','May 17','May 20'].map((d,i) => <span key={i}>{d}</span>)}
      </div>
    </div>
  );
}

              })}
              <div className="checklist-foot">
                <h5>Debug checklist</h5>
                <ul>
                  <li>Is the assignment call running on every request, or short-circuiting for some users?</li>
                  <li>Is <code>user_id</code> stable between assignment and the goal event?</li>
                  <li>Is bot traffic hitting one group only (caching / robots.txt)?</li>
                  <li>Does the client hash match <code>{meta.hashVersion}</code>?</li>
                </ul>
              </div>
            </div>
          )}

          {/* 2. HERO — verdict + evidence */}
          <div className={`v2-hero ${s.verdict}`}>
            <div className="left">
              <div className="eyebrow">
                <span className="ico">{ICONS[s.verdict]}</span>
                Verdict
                {s.isFinal && <>{' '}· Final</>}
              </div>
              <h2 className="title">{s.title}</h2>
              <p className="why">{renderMd(s.why)}</p>
              <div className="runtime">
                <span>{s.status === 'stopped' ? `${s.days} days run` : `Day ${s.days}/${s.daysGoal}`}</span>
                <span className="dot"/>
                <span>α = {meta.alpha}</span>
                {totalUsers && <>
                  <span className="dot"/>
                  <span>{totalUsers.toLocaleString()} users</span>
                </>}
              </div>
            </div>
            {s.rawNumbers ? (
              <div className="right">
                <div className="metric-name">
                  <span className="tag">Goal</span>
                  <span>{s.goal.name}</span>
                </div>
                <div className="v2-stats">
                  <div className="v2-stat-line">
                    <span className="k"><span className="sw" style={{background:'var(--fg-3)'}}/>control</span>
                    <span className="v">{fmtPct(s.rawNumbers.ctrl,1)}</span>
                    <span className="sub">n = {s.usersPerGroup[0].toLocaleString()}</span>
                  </div>
                  <div className="v2-stat-line">
                    <span className="k"><span className="sw" style={{background:'var(--accent)'}}/>{meta.groups[1].name}</span>
                    <span className="v">{fmtPct(s.rawNumbers.test,1)}</span>
                    <span className="sub">n = {s.usersPerGroup[1].toLocaleString()}</span>
                  </div>
                  <div className={`v2-stat-line delta ${s.rawNumbers.delta>0?'pos':'neg'}`}>
                    <span className="k">Δ</span>
                    <span className="v">{s.rawNumbers.delta>0?'+':''}{fmtPct(s.rawNumbers.delta,1)}</span>
                    <span className="sub">{s.rawNumbers.deltaRel>0?'+':''}{fmtPct(s.rawNumbers.deltaRel,1)} rel</span>
                  </div>
                  <div className="v2-stat-line p">
                    <span className="k">p-value</span>
                    <span className={`v ${s.rawNumbers.p<meta.alpha?'sig':''}`}>{fmtP(s.rawNumbers.p)}</span>
                    <span className="sub">95% CI shown ↓</span>
                  </div>
                </div>
                <div className="ci-zone">
                  <BigCIBar delta={s.goal.delta} ci={s.goal.ci} lowerBetter={s.goal.lowerBetter}/>
                </div>
              </div>
            ) : (
              <div className="right" style={{justifyContent:'center',alignItems:'center'}}>
                <IconLock size={20} style={{color:'var(--fg-4)'}}/>
                <div style={{color:'var(--fg-3)',fontSize:13,textAlign:'center',maxWidth:'28ch'}}>
                  Results withheld until the issue is resolved.
                </div>
              </div>
            )}
          </div>

          {/* 3. SCOREBOARD */}
          {s.showResults && (s.guards.length > 0 || s.secs.length > 0) && (
            <div className="v2-board">
              {s.guards.length > 0 && <div className="v2-board-section">
                <div className="v2-board-header">
                  <IconShield size={12} style={{color:'var(--fg-3)'}}/>
                  <span className="kind">Guardrails</span>
                  <span className={`summary ${guardsFailed>0?'bad':'ok'}`}>
                    {guardsFailed>0
                      ? <><IconAlert size={11}/> {guardsFailed} regressed · {guardsPassed} pass</>
                      : <><IconCheck size={11}/> all {guardsPassed} pass</>}
                  </span>
                </div>
                {s.guards.map((g,i) => <Row key={i} m={g} kind="guard"/>)}
              </div>}
              {s.secs.length > 0 && <div className="v2-board-section">
                <div className="v2-board-header">
                  <IconActivity size={12} style={{color:'var(--fg-3)'}}/>
                  <span className="kind">Secondary</span>
                  <span className="summary">
                    {secsSig} of {s.secs.length} significant
                  </span>
                </div>
                {s.secs.map((g,i) => <Row key={i} m={g} kind="sec"/>)}
              </div>}
            </div>
          )}

          {/* 4. DRAWERS — time series + setup (collapsed) */}
          {s.showResults && <>
            <details className="v2-drawer" open>
              <summary>
                <IconChevronRight size={12} className="chev"/>
                <span className="t">Time series</span>
                <span className="sub">{s.goal.name}</span>
              </summary>
              <div className="v2-drawer-body">
                <TimeSeriesV2
                  mode={s.timeseries}
                  peekUntil={s.peek?(meta.minRuntime-1):null}
                  stoppedAt={s.status==='stopped'?s.days-1:null}/>
              </div>
            </details>

            <details className="v2-drawer">
              <summary>
                <IconChevronRight size={12} className="chev"/>
                <span className="t">Setup</span>
                <span className="sub">{meta.universe.id} · {meta.universe.pct}% holdout · {meta.allocation}% alloc · gate {meta.gate}</span>
              </summary>
              <div className="v2-drawer-body">
                <div className="setup-flow">
                  {(() => {
                    const total = 28400;
                    const holdout = Math.round(total * (meta.universe.pct/100));
                    const inExp = Math.round((total - holdout) * (meta.allocation/100));
                    const perGroup = s.usersPerGroup || [Math.round(inExp/2),Math.round(inExp/2)];
                    return <>
                      <div className="node">
                        <span className="lbl">Universe</span>
                        <span className="v">{total.toLocaleString()}</span>
                        <span className="sub">{meta.universe.id} / day</span>
                      </div>
                      <div className="node">
                        <span className="lbl">Holdout · {meta.universe.pct}%</span>
                        <span className="v" style={{color:'var(--fg-3)'}}>{holdout.toLocaleString()}</span>
                        <span className="sub">slots 0–500/10k</span>
                      </div>
                      <div className="node">
                        <span className="lbl">In experiment · {meta.allocation}%</span>
                        <span className="v">{inExp.toLocaleString()}</span>
                        <span className="sub">gate · {meta.gate}</span>
                      </div>
                      <div className="node">
                        <span className="lbl">control · 50%</span>
                        <span className="v">{(perGroup[0]||0).toLocaleString()}</span>
                        <span className="sub">{((perGroup[0]||0)/total*100).toFixed(1)}% of universe</span>
                      </div>
                      <div className="node test">
                        <span className="lbl">{meta.groups[1].name} · 50%</span>
                        <span className="v">{(perGroup[1]||0).toLocaleString()}</span>
                        <span className="sub">{((perGroup[1]||0)/total*100).toFixed(1)}% of universe</span>
                      </div>
                    </>;
                  })()}
                </div>

                <div className="config-grid">
                  <div className="kv"><span className="k">Hypothesis</span>
                    <span className="v" style={{whiteSpace:'normal',fontFamily:'var(--sans)',fontSize:11.5,color:'var(--fg-2)'}}>{meta.question}</span></div>
                  <div className="kv"><span className="k">Success criteria</span>
                    <span className="v" style={{whiteSpace:'normal',fontFamily:'var(--sans)',fontSize:11.5,color:'var(--fg-2)'}}>{meta.success}</span></div>
                  <div className="kv"><span className="k">Unit</span><span className="v">{meta.universe.unit}</span></div>
                  <div className="kv"><span className="k">Hash</span><span className="v">{meta.hashVersion}</span></div>
                  <div className="kv"><span className="k">cuped_frozen_at</span>
                    <span className="v">{meta.cupedFrozenAt.slice(0,16).replace('T',' ')}Z</span></div>
                  <div className="kv"><span className="k">Min runtime</span><span className="v">{meta.minRuntime} days</span></div>
                  <div className="kv"><span className="k">Significance α</span><span className="v">{meta.alpha}</span></div>
                  <div className="kv"><span className="k">Winsorization</span><span className="v">99th pct</span></div>
                  <div className="kv"><span className="k">Params</span>
                    <span className="v">{Object.entries(meta.paramsSchema).map(([k,v])=>`${k}:${v}`).join(', ')}</span></div>
                  <div className="kv"><span className="k">Last analyzed</span><span className="v">12 min ago</span></div>
                </div>
              </div>
            </details>
          </>}

          </>}
        </div>{/* /v2-main-col */}
        <MetaSidebar
          state={s}
          meta={meta}
          collapsed={metaCollapsed}
          onToggle={() => setMetaCollapsed(!metaCollapsed)}
        />
        </div>{/* /v2-shell */}
        </div>{/* /v2-page */}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<ResultsPage/>);
</script>
</body>
</html>
