<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Author gatekeeper · v2 · Shipeasy</title>
<meta name="viewport" content="width=1440"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css?v=3">
<link rel="stylesheet" href="forms.css?v=1">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  /* ─────────────────────────────────────────────────
     Gatekeeper authoring (mirrors create-config v3 chrome)
     ───────────────────────────────────────────────── */

  /* ── Section card (shared with create-config) ──── */
  .cc-card{background:var(--bg-1);border:1px solid var(--line-2);
    border-radius:var(--r-lg);overflow:hidden}
  .cc-card .cc-hd{padding:13px 18px;border-bottom:1px solid var(--line-2);
    display:flex;align-items:center;gap:12px;background:var(--bg-2)}
  .cc-card .cc-hd .ttl{font-size:13.5px;font-weight:500;letter-spacing:-0.005em;color:var(--fg)}
  .cc-card .cc-hd .sub{font-family:var(--mono);font-size:10.5px;color:var(--fg-3);
    letter-spacing:.06em;text-transform:uppercase}

  /* ── Wizard stepper ──────────────────────────── */
  .wiz-stepper{display:flex;align-items:center;gap:0;
    padding:14px 22px;background:var(--bg-1);border:1px solid var(--line-2);
    border-radius:var(--r-lg)}
  .wiz-step{display:flex;align-items:center;gap:11px;padding:8px 8px;
    cursor:default;flex-shrink:0;color:var(--fg-3);transition:color .12s;border-radius:8px}
  .wiz-step:hover{color:var(--fg-2)}
  .wiz-step .num{width:26px;height:26px;border-radius:50%;
    display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:500;
    background:var(--bg-3);border:1px solid var(--line-2);color:var(--fg-3);flex-shrink:0;
    transition:all .15s}
  .wiz-step.done .num{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
  .wiz-step.current .num{background:var(--bg-1);color:var(--fg);
    border-color:var(--accent);
    box-shadow:0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent)}
  .wiz-step.current{color:var(--fg)}
  .wiz-step.done{color:var(--fg-2)}
  .wiz-step .body{display:flex;flex-direction:column;line-height:1.2}
  .wiz-step .lbl{font-size:13.5px;font-weight:500;letter-spacing:-0.005em}
  .wiz-step .tag{font-family:var(--mono);font-size:10px;color:var(--fg-4);
    text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
  .wiz-step.current .tag{color:var(--accent)}
  .wiz-conn{flex:1;height:1px;background:var(--line-2);margin:0 6px;min-width:18px}
  .wiz-conn.done{background:var(--accent)}

  /* ── Wizard footer ───────────────────────────── */
  .wiz-foot{display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;background:var(--bg-1);border:1px solid var(--line-2);
    border-radius:var(--r-lg);position:sticky;bottom:16px;
    box-shadow:0 12px 32px -8px rgba(0,0,0,.5);z-index:10}
  .wiz-foot .meta{font-family:var(--mono);font-size:11.5px;color:var(--fg-3);
    display:flex;align-items:center;gap:8px}
  .wiz-foot .meta .sep{color:var(--fg-4)}
  .wiz-foot .acts{display:flex;align-items:center;gap:10px}

  /* ── Editable inputs (shared) ────────────────── */
  .ed-input{display:flex;align-items:center;gap:8px;
    background:var(--bg-2);border:1px solid var(--line-2);
    border-radius:var(--r-md);padding:0 12px;height:38px;
    transition:border-color .12s,background .12s}
  .ed-input:hover{border-color:var(--line-3);background:var(--bg-3)}
  .ed-input:focus-within{border-color:var(--accent);background:var(--bg-1);
    box-shadow:0 0 0 3px color-mix(in oklab, var(--accent) 16%, transparent)}
  .ed-input input,.ed-input select{all:unset;flex:1;font-size:14px;
    color:var(--fg);min-width:0;font-family:inherit;cursor:text}
  .ed-input.mono input{font-family:var(--mono);font-size:13.5px;font-weight:500}
  .ed-input input::placeholder{color:var(--fg-4)}
  .ed-input .pre{font-family:var(--mono);font-size:12.5px;color:var(--fg-3);flex-shrink:0}
  .ed-input .lock{color:var(--fg-3);flex-shrink:0;cursor:help}
  .ed-input.disabled{background:var(--bg-1);border-color:var(--line);
    cursor:not-allowed;border-style:dashed}
  .ed-input.disabled:hover{background:var(--bg-1);border-color:var(--line)}
  .ed-input.disabled input{color:var(--fg-2);cursor:not-allowed}
  .ed-input.sm{height:30px;padding:0 10px}
  .ed-input.sm input,.ed-input.sm select{font-size:12.5px}

  .ed-textarea{width:100%;background:var(--bg-2);border:1px solid var(--line-2);
    border-radius:var(--r-md);padding:11px 13px;color:var(--fg);
    font-family:inherit;font-size:13.5px;line-height:1.55;
    resize:vertical;min-height:88px;outline:none;
    transition:border-color .12s,background .12s}
  .ed-textarea:hover{border-color:var(--line-3);background:var(--bg-3)}
  .ed-textarea:focus{border-color:var(--accent);background:var(--bg-1);
    box-shadow:0 0 0 3px color-mix(in oklab, var(--accent) 16%, transparent)}
  .ed-textarea::placeholder{color:var(--fg-4)}

  .ed-select{position:relative}
  .ed-select::after{content:"";position:absolute;right:13px;top:50%;
    width:7px;height:7px;border-right:1.5px solid var(--fg-3);
    border-bottom:1.5px solid var(--fg-3);transform:translateY(-70%) rotate(45deg);
    pointer-events:none}
  .ed-select .ed-input{padding-right:34px;cursor:default}

  /* ── Form rows (Step 1) ───────────────────────── */
  .cf-row{display:grid;grid-template-columns:200px minmax(0,1fr);
    align-items:start;padding:18px 22px;gap:22px;
    border-bottom:1px solid var(--line)}
  .cf-row:last-child{border-bottom:none}
  .cf-row .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--fg-3);padding-top:11px;
    display:flex;align-items:center;gap:6px}
  .cf-row .lbl .req{color:var(--accent);font-size:11px}
  .cf-row .help{font-size:11.5px;color:var(--fg-3);margin-top:7px;line-height:1.55}
  .cf-row .help code{font-family:var(--mono);background:var(--bg-3);
    padding:1px 5px;border-radius:3px;color:var(--fg-2);font-size:11px}

  .tip-wrap{position:relative;display:inline-flex}
  .tip-wrap .tip{position:absolute;bottom:calc(100% + 6px);right:0;
    background:#000;color:var(--fg);font-size:11.5px;padding:6px 10px;
    border-radius:6px;white-space:nowrap;pointer-events:none;
    border:1px solid var(--line-2);opacity:0;transition:opacity .12s;
    box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:5}
  .tip-wrap .tip::after{content:"";position:absolute;top:100%;right:14px;
    border:5px solid transparent;border-top-color:#000}
  .tip-wrap:hover .tip{opacity:1}

  /* ── Step head + pills (shared) ───────────────── */
  .step-head{display:flex;align-items:flex-end;justify-content:space-between;
    gap:24px;padding:0 4px}
  .step-head h2{font-size:24px;font-weight:600;letter-spacing:-0.015em;
    margin:6px 0 4px}
  .step-head .stem{font-family:var(--mono);font-size:11px;color:var(--accent);
    letter-spacing:.06em;text-transform:uppercase}
  .step-head p{color:var(--fg-2);font-size:13.5px;line-height:1.55;
    max-width:64ch;margin:0}

  .pill-stat{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
    border-radius:999px;font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;
    border:1px solid var(--line-2);text-transform:uppercase;font-weight:500}
  .pill-stat.valid{background:color-mix(in oklab, var(--accent) 12%, transparent);
    color:var(--accent);border-color:color-mix(in oklab, var(--accent) 35%, transparent)}
  .pill-stat.draft{background:var(--warn-soft);color:var(--warn);
    border-color:color-mix(in oklab, var(--warn) 35%, transparent)}

  .hint-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;
    background:color-mix(in oklab, var(--accent) 5%, var(--bg-1));
    border:1px solid color-mix(in oklab, var(--accent) 22%, var(--line-2));
    border-radius:var(--r-md);font-size:12.5px;color:var(--fg-2);line-height:1.5}
  .hint-bar b{color:var(--fg);font-weight:500}

  /* ── Toolbar pieces (shared) ──────────────────── */
  .sv-toolbar{display:flex;align-items:center;gap:8px;padding:12px 16px;
    background:var(--bg-2);border-bottom:1px solid var(--line-2)}
  .sv-toolbar .add-root{display:inline-flex;align-items:center;gap:8px;
    padding:8px 14px;background:var(--accent);color:var(--accent-fg);
    border:1px solid color-mix(in oklab, var(--accent) 75%, white);
    border-radius:var(--r-md);font-family:inherit;font-size:13px;font-weight:500;
    cursor:default;
    box-shadow:0 1px 0 rgba(255,255,255,.18) inset,
               0 4px 10px -4px color-mix(in oklab, var(--accent) 60%, transparent)}
  .sv-toolbar .add-root:hover{filter:brightness(1.08)}
  .sv-toolbar .secondary-act{display:inline-flex;align-items:center;gap:6px;
    padding:7px 12px;background:var(--bg-3);color:var(--fg-2);
    border:1px solid var(--line-2);border-radius:var(--r-md);
    font-size:12.5px;cursor:default}
  .sv-toolbar .secondary-act:hover{background:var(--bg-4);color:var(--fg)}

  .ic-btn{all:unset;width:28px;height:28px;display:grid;place-items:center;
    border-radius:var(--r-sm);color:var(--fg-3);cursor:default}
  .ic-btn:hover{background:var(--bg-3);color:var(--fg)}
  .ic-btn.danger:hover{background:var(--danger-soft);color:var(--danger)}
  .ic-btn.solid{background:var(--bg-3);border:1px solid var(--line-2)}
  .ic-btn.solid:hover{background:var(--bg-4);color:var(--fg);border-color:var(--line-3)}

  .row-edit-btn{display:inline-flex;align-items:center;gap:5px;
    padding:5px 10px;background:var(--bg-3);border:1px solid var(--line-2);
    border-radius:var(--r-sm);font-size:11.5px;color:var(--fg-2);cursor:default;
    font-family:inherit}
  .row-edit-btn:hover{background:var(--bg-4);color:var(--fg);border-color:var(--line-3)}

  /* ── Modal (shared) ───────────────────────────── */
  .modal-bd{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:50;
    display:grid;place-items:center;backdrop-filter:blur(4px);
    animation:bd-in .15s ease-out}
  @keyframes bd-in{from{opacity:0}to{opacity:1}}
  .modal{background:var(--bg-1);border:1px solid var(--line-2);
    border-radius:var(--r-lg);max-height:88vh;
    display:flex;flex-direction:column;overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.6);
    animation:m-in .18s cubic-bezier(.16,.84,.44,1)}
  @keyframes m-in{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
  .modal.sm{max-width:480px;width:calc(100% - 48px)}
  .modal.md{max-width:680px;width:calc(100% - 48px)}
  .modal.lg{max-width:920px;width:calc(100% - 48px)}
  .modal.xl{max-width:1080px;width:calc(100% - 48px)}
  .modal-hd{padding:18px 22px;border-bottom:1px solid var(--line-2);
    display:flex;align-items:center;gap:14px;background:var(--bg-2)}
  .modal-hd .icn{width:36px;height:36px;display:grid;place-items:center;
    border-radius:9px;background:var(--bg-3);border:1px solid var(--line-2);
    color:var(--fg-2);flex-shrink:0}
  .modal-hd .icn.accent{background:color-mix(in oklab, var(--accent) 14%, var(--bg-3));
    border-color:color-mix(in oklab, var(--accent) 35%, var(--line-2));color:var(--accent)}
  .modal-hd .body{flex:1;min-width:0}
  .modal-hd .ttl{font-size:16px;font-weight:600;letter-spacing:-0.01em;color:var(--fg)}
  .modal-hd .sub{font-family:var(--mono);font-size:11px;color:var(--fg-3);
    text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
  .modal-bd-content{padding:22px;overflow-y:auto;flex:1;
    display:flex;flex-direction:column;gap:18px}
  .modal-ft{padding:14px 22px;border-top:1px solid var(--line-2);
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--bg-2)}
  .modal-ft .left{display:flex;align-items:center;gap:8px;
    font-size:11.5px;color:var(--fg-3)}
  .modal-ft .right{display:flex;align-items:center;gap:8px}

  .m-field{display:flex;flex-direction:column;gap:7px}
  .m-field .fl{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--fg-3);
    display:flex;align-items:center;gap:6px}
  .m-field .fl .hint{color:var(--fg-4);text-transform:none;letter-spacing:0;
    font-size:11px;font-family:var(--sans)}

  .req-toggle{display:inline-flex;align-items:center;gap:11px;cursor:default;padding:6px 0}
  .req-toggle .sw{width:34px;height:20px;border-radius:99px;background:var(--bg-3);
    border:1px solid var(--line-2);position:relative;transition:all .12s;flex-shrink:0}
  .req-toggle .sw::after{content:"";position:absolute;top:1px;left:1px;
    width:16px;height:16px;border-radius:50%;background:var(--fg-3);transition:all .15s}
  .req-toggle.on .sw{background:color-mix(in oklab, var(--accent) 32%, var(--bg-3));
    border-color:color-mix(in oklab, var(--accent) 50%, var(--line-2))}
  .req-toggle.on .sw::after{transform:translateX(14px);background:var(--accent)}
  .req-toggle .lab{font-size:13px;color:var(--fg-2)}
  .req-toggle .lab b{color:var(--fg);font-weight:500}

  /* ─────────────────────────────────────────────────
     GATES — list + cards (Step 2)
     ───────────────────────────────────────────────── */

  .gk-stack{display:flex;flex-direction:column;gap:0;padding:0;
    background:var(--bg-1)}

  .gk-eval-flow{padding:14px 18px;background:var(--bg-2);
    border-bottom:1px solid var(--line-2);
    font-family:var(--mono);font-size:11px;color:var(--fg-3);
    display:flex;align-items:center;gap:10px}
  .gk-eval-flow b{color:var(--fg-2);font-weight:500}
  .gk-eval-flow .arrow{color:var(--fg-4)}

  .gk-gate{display:grid;grid-template-columns:32px 36px minmax(0,1fr) 130px 110px auto;
    gap:14px;align-items:center;padding:14px 18px 14px 14px;
    border-bottom:1px solid var(--line);background:var(--bg-1);
    cursor:default;transition:background .1s;position:relative}
  .gk-gate:hover{background:color-mix(in oklab, var(--accent) 3%, var(--bg-1))}
  .gk-gate:last-child{border-bottom:none}
  .gk-gate.locked{background:color-mix(in oklab, var(--fg-4) 4%, var(--bg-1))}
  .gk-gate.locked:hover{background:color-mix(in oklab, var(--fg-4) 6%, var(--bg-1))}
  .gk-gate.dragging{opacity:.6}

  .gk-gate .order{font-family:var(--mono);font-size:11.5px;color:var(--fg-4);
    width:32px;display:flex;align-items:center;justify-content:center;gap:4px}
  .gk-gate .order .grip{display:flex;flex-direction:column;gap:1.5px;cursor:grab}
  .gk-gate .order .grip span{width:9px;height:1.5px;background:var(--fg-4);border-radius:1px}
  .gk-gate .order .n{font-weight:500;color:var(--fg-3)}
  .gk-gate.locked .order .grip{visibility:hidden}

  .gk-gate .badge-ico{width:36px;height:36px;border-radius:9px;
    display:grid;place-items:center;flex-shrink:0;
    border:1px solid var(--line-2);background:var(--bg-2);color:var(--fg-2)}
  .gk-gate.t-condition .badge-ico{
    color:var(--info);
    border-color:color-mix(in oklab, var(--info) 32%, var(--line-2));
    background:color-mix(in oklab, var(--info) 10%, var(--bg-2))}
  .gk-gate.t-rollout .badge-ico{
    color:var(--accent);
    border-color:color-mix(in oklab, var(--accent) 32%, var(--line-2));
    background:color-mix(in oklab, var(--accent) 10%, var(--bg-2))}
  .gk-gate.locked .badge-ico{
    color:var(--fg-3);
    border-color:var(--line-2);
    background:var(--bg-3)}

  .gk-gate .body{min-width:0;display:flex;flex-direction:column;gap:3px}
  .gk-gate .body .name{font-size:14px;font-weight:500;color:var(--fg);
    display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .gk-gate .body .name .pill{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;
    text-transform:uppercase;padding:1.5px 6px;border-radius:3px;border:1px solid var(--line-2);
    color:var(--fg-3);background:var(--bg-3)}
  .gk-gate .body .name .pill.cond{color:var(--info);
    border-color:color-mix(in oklab, var(--info) 30%, var(--line-2));
    background:color-mix(in oklab, var(--info) 10%, transparent)}
  .gk-gate .body .name .pill.roll{color:var(--accent);
    border-color:color-mix(in oklab, var(--accent) 30%, var(--line-2));
    background:color-mix(in oklab, var(--accent) 10%, transparent)}
  .gk-gate .body .name .pill.tmpl{color:var(--purple);
    border-color:color-mix(in oklab, var(--purple) 30%, var(--line-2));
    background:color-mix(in oklab, var(--purple) 10%, transparent)}
  .gk-gate .body .summary{font-family:var(--mono);font-size:11.5px;
    color:var(--fg-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gk-gate .body .summary code{color:var(--fg-2)}

  /* Pass column */
  .gk-pass{display:flex;flex-direction:column;align-items:flex-start;gap:4px}
  .gk-pass .top{font-family:var(--mono);font-size:11px;color:var(--fg-3);
    display:flex;align-items:center;gap:6px}
  .gk-pass .num{font-family:var(--mono);font-size:13.5px;color:var(--fg);font-weight:500}
  .gk-pass .bar{width:100%;height:5px;background:var(--bg-3);border-radius:99px;overflow:hidden}
  .gk-pass .bar .fill{height:100%;background:var(--accent);border-radius:99px;transition:width .2s}
  .gk-pass.cond .bar .fill{background:var(--info)}

  .gk-state{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--fg-3)}
  .gk-state .toggle{cursor:default}
  .gk-actions{display:flex;align-items:center;gap:4px;opacity:.55;transition:opacity .1s}
  .gk-gate:hover .gk-actions{opacity:1}

  /* Locked footer note for public gate */
  .gk-locked-note{padding:10px 18px;background:color-mix(in oklab, var(--fg-4) 4%, var(--bg-2));
    border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;
    color:var(--fg-3);display:flex;align-items:center;gap:8px}

  /* Add-gate empty CTA at the bottom of stack */
  .gk-add-cta{padding:16px 18px;display:flex;justify-content:center;
    background:var(--bg-2);border-top:1px solid var(--line)}

  /* Eval result column (compact rollout slider preview) */
  .mini-roll{display:flex;align-items:center;gap:10px;width:100%;
    padding:6px 8px;border-radius:6px;border:1px solid transparent;
    transition:border-color .12s, background .12s}
  .mini-roll:hover{border-color:var(--line-2);background:var(--bg-2)}
  .mini-roll .num{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent);
    min-width:38px;text-align:right;tabular-nums:tabular-nums}
  .mini-roll .num.zero{color:var(--fg-4)}
  .mini-roll .track{position:relative;flex:1;height:18px;display:flex;align-items:center}
  .mini-roll .bar{flex:1;height:6px;background:var(--bg-3);border-radius:99px;
    overflow:hidden;border:1px solid var(--line);position:relative}
  .mini-roll .bar .fill{height:100%;background:var(--accent);border-radius:99px;transition:width .15s}
  .mini-roll .knob{position:absolute;top:50%;width:14px;height:14px;
    background:var(--bg-1);border:2px solid var(--accent);border-radius:50%;
    transform:translate(-50%,-50%);pointer-events:none;
    box-shadow:0 2px 6px -1px color-mix(in oklab, var(--accent) 50%, transparent);
    opacity:0;transition:opacity .12s}
  .mini-roll:hover .knob{opacity:1}
  .mini-roll input[type="range"]{position:absolute;inset:0;width:100%;height:100%;
    opacity:0;cursor:default;margin:0;padding:0}
  .mini-roll.locked{opacity:.85}
  .mini-roll.locked input[type="range"]{cursor:not-allowed}

  /* Drag insert line */
  .gk-insert{height:0;border-top:2px dashed color-mix(in oklab, var(--accent) 50%, transparent);
    margin:0 16px;opacity:0;transition:opacity .15s}
  .gk-insert.show{opacity:1}

  /* ─────────────────────────────────────────────────
     GATE EDITOR (full page when gateEditId set)
     ───────────────────────────────────────────────── */
  .ge-grid{display:grid;grid-template-columns:1fr 380px;gap:22px;align-items:start}
  .ge-rules{display:flex;flex-direction:column;gap:10px}

  .ge-rule{padding:12px;background:var(--bg-2);border:1px solid var(--line);
    border-radius:var(--r-md);position:relative}
  .ge-rule + .ge-rule{position:relative}
  .ge-rule + .ge-rule::before{
    content:"AND";position:absolute;left:14px;top:-12px;
    font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;
    background:var(--bg-1);color:var(--fg-3);padding:2px 8px;
    border:1px solid var(--line-2);border-radius:99px}
  .ge-rule.or + .ge-rule.or::before{content:"OR"}

  .ge-cond{display:grid;grid-template-columns:minmax(0,1.4fr) 130px minmax(0,1.6fr) 28px;
    gap:8px;align-items:center}
  .ge-cond > .ed-input{height:34px}
  .ge-cond > .ed-input input,.ge-cond > .ed-input select{font-size:13px}

  /* Attribute helper sidebar */
  .ge-attrs{padding:0}
  .ge-attrs .ge-attrs-grp{padding:10px 14px;font-family:var(--mono);font-size:9.5px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--fg-4);
    background:var(--bg-2);border-bottom:1px solid var(--line);
    border-top:1px solid var(--line)}
  .ge-attrs .ge-attrs-grp:first-of-type{border-top:none}
  .ge-attrs .ge-attr{display:flex;align-items:center;gap:8px;padding:9px 14px;
    border-bottom:1px solid var(--line);cursor:default;font-size:12px}
  .ge-attrs .ge-attr:hover{background:color-mix(in oklab, var(--accent) 5%, var(--bg-1))}
  .ge-attrs .ge-attr:last-child{border-bottom:none}
  .ge-attrs .ge-attr .key{font-family:var(--mono);font-size:12px;color:var(--fg);
    flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ge-attrs .ge-attr .ex{font-family:var(--mono);font-size:11px;color:var(--fg-3);
    flex-shrink:0}
  .ge-attrs .ge-attr .add{opacity:0;transition:opacity .1s;color:var(--accent)}
  .ge-attrs .ge-attr:hover .add{opacity:1}

  /* Rollout slider */
  .gk-rollout-card{padding:22px 24px;background:var(--bg-2);
    border:1px solid var(--line);border-radius:var(--r-md)}
  .gk-rollout-card .num-big{font-family:var(--mono);font-size:48px;font-weight:600;
    color:var(--accent);letter-spacing:-0.02em;line-height:1}
  .gk-rollout-card .num-big.zero{color:var(--fg-4)}
  .gk-rollout-card .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--fg-3);margin-top:6px}
  .gk-rollout-track{position:relative;height:36px;margin:18px 0 6px}
  .gk-rollout-track .bg{position:absolute;inset:14px 0;background:var(--bg-3);
    border-radius:99px;border:1px solid var(--line)}
  .gk-rollout-track .fill{position:absolute;top:14px;bottom:14px;left:0;
    background:var(--accent);border-radius:99px;
    box-shadow:0 0 0 1px color-mix(in oklab, var(--accent) 60%, transparent)}
  .gk-rollout-track .knob{position:absolute;top:4px;width:28px;height:28px;
    background:var(--bg-1);border:2px solid var(--accent);border-radius:50%;
    transform:translateX(-50%);
    box-shadow:0 4px 10px -2px color-mix(in oklab, var(--accent) 50%, transparent)}
  .gk-rollout-track input{position:absolute;inset:0;width:100%;height:100%;
    opacity:0;cursor:default;margin:0;padding:0}
  .gk-rollout-ticks{display:flex;justify-content:space-between;font-family:var(--mono);
    font-size:10.5px;color:var(--fg-4);margin-top:4px}

  /* Bucket viz — shows hash distribution */
  .bucket-viz{display:grid;grid-template-columns:repeat(20,1fr);gap:2px;margin-top:8px}
  .bucket-viz .cell{height:14px;border-radius:2px;background:var(--bg-3);
    border:1px solid var(--line)}
  .bucket-viz .cell.in{background:var(--accent);border-color:var(--accent)}

  /* Test panel */
  .test-panel{display:flex;flex-direction:column;gap:14px;padding:18px}
  .test-row{display:flex;align-items:center;gap:8px;padding:8px 10px;
    background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-sm);
    font-size:12.5px}
  .test-row.pass{border-color:color-mix(in oklab, var(--accent) 40%, var(--line));
    background:color-mix(in oklab, var(--accent) 6%, var(--bg-2))}
  .test-row.fail{opacity:.6}
  .test-row .pill{font-family:var(--mono);font-size:9.5px;padding:2px 7px;
    border-radius:3px;background:var(--bg-3);color:var(--fg-3);
    text-transform:uppercase;letter-spacing:.05em}
  .test-row.pass .pill{background:color-mix(in oklab, var(--accent) 18%, transparent);
    color:var(--accent)}
  .test-row.fail .pill{background:var(--bg-3);color:var(--fg-4)}
  .test-row.skip{opacity:.45}
  .test-row.skip .pill{background:var(--bg-3);color:var(--fg-4)}
  .test-row .lbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .test-row .meta{font-family:var(--mono);font-size:10.5px;color:var(--fg-4);flex-shrink:0}

  .result-stripe{padding:16px 18px;display:flex;align-items:center;gap:14px;
    border-radius:var(--r-md);
    background:color-mix(in oklab, var(--accent) 12%, var(--bg-1));
    border:1px solid color-mix(in oklab, var(--accent) 32%, transparent)}
  .result-stripe .label{font-family:var(--mono);font-size:11px;color:var(--accent);
    letter-spacing:.06em;text-transform:uppercase}
  .result-stripe .v{font-family:var(--mono);font-size:22px;font-weight:600;
    color:var(--accent);letter-spacing:-0.01em}
  .result-stripe.deny{background:color-mix(in oklab, var(--danger) 10%, var(--bg-1));
    border-color:color-mix(in oklab, var(--danger) 30%, transparent)}
  .result-stripe.deny .label,.result-stripe.deny .v{color:var(--danger)}

  /* Template picker grid */
  .tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tpl-card{padding:14px;background:var(--bg-2);border:1px solid var(--line-2);
    border-radius:var(--r-md);cursor:default;transition:all .12s;
    display:flex;gap:12px;align-items:flex-start}
  .tpl-card:hover{border-color:color-mix(in oklab, var(--accent) 50%, var(--line-2));
    background:color-mix(in oklab, var(--accent) 4%, var(--bg-2))}
  .tpl-card .ico{width:34px;height:34px;border-radius:8px;flex-shrink:0;
    display:grid;place-items:center;background:var(--bg-3);border:1px solid var(--line-2)}
  .tpl-card .body{flex:1;min-width:0}
  .tpl-card .ttl{font-size:13px;font-weight:500;color:var(--fg);
    display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .tpl-card .ttl .pill{font-family:var(--mono);font-size:9px;padding:1.5px 5px;
    border-radius:3px;background:var(--bg-3);color:var(--fg-3);
    border:1px solid var(--line-2);text-transform:uppercase;letter-spacing:.05em}
  .tpl-card .ttl .pill.auto{color:var(--info);
    border-color:color-mix(in oklab, var(--info) 30%, var(--line-2));
    background:color-mix(in oklab, var(--info) 10%, transparent)}
  .tpl-card .ttl .pill.tmpl{color:var(--purple);
    border-color:color-mix(in oklab, var(--purple) 30%, var(--line-2));
    background:color-mix(in oklab, var(--purple) 10%, transparent)}
  .tpl-card .desc{font-size:11.5px;color:var(--fg-3);line-height:1.5;margin-top:3px}
  .tpl-card .preview{margin-top:8px;font-family:var(--mono);font-size:10.5px;
    color:var(--fg-3);background:var(--bg-1);border:1px solid var(--line);
    border-radius:var(--r-sm);padding:6px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .tpl-tabs{display:flex;gap:0;border-bottom:1px solid var(--line-2);background:var(--bg-2);
    margin:-22px -22px 0;padding:0 22px}
  .tpl-tabs button{all:unset;padding:12px 16px;font-size:13px;font-weight:500;
    color:var(--fg-3);cursor:default;border-bottom:2px solid transparent;
    margin-bottom:-1px;display:flex;align-items:center;gap:8px}
  .tpl-tabs button:hover{color:var(--fg-2)}
  .tpl-tabs button.active{color:var(--fg);border-bottom-color:var(--accent)}
  .tpl-tabs button .count{font-family:var(--mono);font-size:10.5px;color:var(--fg-4);
    padding:1px 6px;background:var(--bg-3);border-radius:3px;border:1px solid var(--line-2)}

  /* Op pill in summary */
  .op-tok{font-family:var(--mono);font-size:11px;padding:1px 6px;border-radius:3px;
    background:var(--bg-3);color:var(--fg-2);border:1px solid var(--line-2)}
  .key-tok{font-family:var(--mono);font-size:11px;color:#a78bfa}
  .val-tok{font-family:var(--mono);font-size:11px;color:var(--accent)}

  /* SDK preview (review + modal) */
  .sdk-tabs{display:flex;gap:0;border-bottom:1px solid var(--line-2);
    background:var(--bg-2);padding:0 12px;overflow-x:auto}
  .sdk-tabs button{all:unset;padding:11px 14px;font-family:var(--mono);
    font-size:11.5px;color:var(--fg-3);cursor:default;letter-spacing:.02em;
    border-bottom:2px solid transparent;margin-bottom:-1px;
    display:flex;align-items:center;gap:6px}
  .sdk-tabs button:hover{color:var(--fg-2)}
  .sdk-tabs button.active{color:var(--fg);border-bottom-color:var(--accent)}
  .sdk-body{position:relative;background:var(--bg-1)}
  .sdk-body pre{margin:0;padding:18px 22px;font-family:var(--mono);font-size:12.5px;
    line-height:1.7;color:var(--fg-2);white-space:pre;overflow-x:auto}
  .sdk-body .copy-fab{position:absolute;top:10px;right:12px;
    display:flex;align-items:center;gap:6px;padding:5px 10px;
    background:var(--bg-3);border:1px solid var(--line-2);border-radius:var(--r-sm);
    font-family:var(--mono);font-size:11px;color:var(--fg-2);cursor:default}
  .sdk-body .ln-num{display:inline-block;width:24px;color:var(--fg-4);
    user-select:none;text-align:right;margin-right:14px}
  .sdk-body .kw{color:#a78bfa}
  .sdk-body .str{color:var(--accent)}
  .sdk-body .num{color:#f0c674}
  .sdk-body .com{color:var(--fg-4);font-style:italic}

  /* Review */
  .rv-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:18px;align-items:start}
  .rv-list{display:flex;flex-direction:column}
  .rv-item{display:grid;grid-template-columns:170px 1fr;gap:14px;
    padding:13px 18px;border-bottom:1px solid var(--line);align-items:start}
  .rv-item:last-child{border-bottom:none}
  .rv-item .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--fg-3);padding-top:3px}
  .rv-item .val{font-size:13.5px;color:var(--fg);line-height:1.55}
  .rv-item .val.mono{font-family:var(--mono);font-size:13px}
  .rv-item .val.dim{color:var(--fg-2)}

  /* "Save as template" inline checkbox */
  .save-tmpl{display:flex;align-items:center;gap:10px;padding:11px 13px;
    background:color-mix(in oklab, var(--purple) 6%, var(--bg-2));
    border:1px dashed color-mix(in oklab, var(--purple) 35%, var(--line-2));
    border-radius:var(--r-md);font-size:12.5px}
  .save-tmpl .cb{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--line-3);
    flex-shrink:0;display:grid;place-items:center;background:var(--bg-1)}
  .save-tmpl.on .cb{background:var(--purple);border-color:var(--purple);color:#fff}
  .save-tmpl b{color:var(--fg)}
  .save-tmpl .hint{color:var(--fg-3);margin-left:auto;font-family:var(--mono);font-size:11px}

  /* ─────────────────────────────────────────────────
     v2 ADDITIONS
     ───────────────────────────────────────────────── */

  /* Killswitch banner at top of wizard */
  .ks-banner{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;
    padding:12px 16px;border-radius:var(--r-lg);
    background:color-mix(in oklab, var(--danger) 8%, var(--bg-1));
    border:1px solid color-mix(in oklab, var(--danger) 28%, var(--line-2))}
  .ks-banner.on{background:color-mix(in oklab, var(--danger) 22%, var(--bg-1));
    border-color:color-mix(in oklab, var(--danger) 55%, var(--line-2));
    box-shadow:0 0 0 1px color-mix(in oklab, var(--danger) 35%, transparent) inset,
               0 12px 36px -12px color-mix(in oklab, var(--danger) 40%, transparent)}
  .ks-banner .icn{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;
    background:color-mix(in oklab, var(--danger) 22%, var(--bg-2));
    border:1px solid color-mix(in oklab, var(--danger) 45%, var(--line-2));
    color:var(--danger);flex-shrink:0}
  .ks-banner .body{min-width:0;display:flex;flex-direction:column;gap:2px}
  .ks-banner .body .ttl{font-size:14px;font-weight:500;color:var(--fg);
    display:flex;align-items:center;gap:8px}
  .ks-banner .body .ttl b{font-family:var(--mono);font-size:11px;
    padding:1.5px 7px;border-radius:3px;letter-spacing:.06em;text-transform:uppercase;
    background:color-mix(in oklab, var(--danger) 22%, var(--bg-3));
    color:var(--danger);
    border:1px solid color-mix(in oklab, var(--danger) 40%, var(--line-2))}
  .ks-banner .body .sub{font-size:12px;color:var(--fg-3);line-height:1.5}
  .ks-banner .body .sub code{font-family:var(--mono);background:var(--bg-3);
    padding:1px 5px;border-radius:3px;color:var(--fg-2);font-size:11px}
  .ks-banner.on .body .sub{color:color-mix(in oklab, var(--fg) 92%, var(--danger))}

  .ks-switch{position:relative;width:62px;height:32px;border-radius:99px;
    background:var(--bg-3);border:1px solid var(--line-2);cursor:default;flex-shrink:0;
    transition:all .15s}
  .ks-switch::after{content:"";position:absolute;top:2px;left:2px;
    width:24px;height:24px;border-radius:50%;
    background:var(--fg-3);transition:all .2s}
  .ks-switch::before{content:"OFF";position:absolute;right:8px;top:50%;
    transform:translateY(-50%);font-family:var(--mono);font-size:9px;
    color:var(--fg-3);letter-spacing:.08em}
  .ks-switch.on{background:var(--danger);border-color:var(--danger);
    box-shadow:0 0 0 3px color-mix(in oklab, var(--danger) 22%, transparent)}
  .ks-switch.on::after{transform:translateX(30px);background:#fff}
  .ks-switch.on::before{content:"KILL";left:8px;right:auto;color:#fff;font-weight:600}

  /* Segmented control (Match ALL / Match ANY) */
  .seg{display:inline-flex;background:var(--bg-3);border:1px solid var(--line-2);
    border-radius:var(--r-sm);padding:2px;gap:2px}
  .seg button{all:unset;padding:5px 12px;border-radius:4px;
    font-size:11.5px;font-weight:500;color:var(--fg-3);cursor:default;
    font-family:inherit;display:flex;align-items:center;gap:6px}
  .seg button:hover{color:var(--fg-2)}
  .seg button.active{background:var(--bg-1);color:var(--fg);
    box-shadow:0 1px 0 var(--line-2)}
  .seg button .tok{font-family:var(--mono);font-size:9.5px;color:var(--fg-4);
    letter-spacing:.05em}
  .seg button.active .tok{color:var(--accent)}
  .seg.danger button.active .tok{color:var(--danger)}

  /* Multi-rule stack with AND/OR connectors */
  .ge-rules{display:flex;flex-direction:column;gap:0;position:relative}
  .ge-rules .rule-row{padding:12px;background:var(--bg-1);
    border:1px solid var(--line);border-radius:var(--r-md);position:relative}
  .ge-rules .rule-row + .rule-row{margin-top:18px}
  .ge-rules .rule-row + .rule-row::before{
    content:attr(data-conn);position:absolute;left:14px;top:-13px;
    font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;
    background:var(--bg-2);color:var(--info);padding:2px 8px;
    border:1px solid color-mix(in oklab, var(--info) 30%, var(--line-2));
    border-radius:99px;z-index:1}
  .ge-rules.any .rule-row + .rule-row::before{color:var(--accent);
    border-color:color-mix(in oklab, var(--accent) 30%, var(--line-2))}
  .rule-row .rule-hd{display:flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:10px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--fg-4);margin-bottom:10px}
  .rule-row .rule-hd .n{padding:1px 6px;border-radius:3px;background:var(--bg-3);
    border:1px solid var(--line-2);color:var(--fg-3)}
  .rule-row .rule-hd .ttype{font-family:var(--mono);font-size:10px;color:var(--fg-3)}
  .rule-row .rule-hd .rm{margin-left:auto;cursor:default}

  .add-rule-cta{display:flex;align-items:center;gap:8px;padding:8px 12px;margin-top:10px;
    border:1px dashed var(--line-2);border-radius:var(--r-md);
    color:var(--fg-3);font-size:12px;font-family:var(--mono);cursor:default;
    background:transparent}
  .add-rule-cta:hover{border-color:var(--accent);
    color:var(--accent);background:color-mix(in oklab, var(--accent) 5%, transparent)}

  /* Rule editor variants */
  .num-stepper{display:flex;align-items:center;gap:0;
    background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-md);
    height:34px;overflow:hidden}
  .num-stepper:hover{border-color:var(--line-3)}
  .num-stepper button{all:unset;width:28px;display:grid;place-items:center;
    color:var(--fg-3);cursor:default;font-size:14px;flex-shrink:0;
    background:transparent}
  .num-stepper button:hover{background:var(--bg-3);color:var(--fg)}
  .num-stepper input{all:unset;flex:1;min-width:0;text-align:center;
    font-family:var(--mono);font-size:13.5px;color:var(--fg);font-weight:500;
    border-left:1px solid var(--line);border-right:1px solid var(--line);
    padding:0 6px;height:32px;line-height:32px}
  .num-stepper .unit{padding:0 10px;font-family:var(--mono);font-size:11px;
    color:var(--fg-3);background:var(--bg-3)}

  .enum-chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px;
    background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-md);
    min-height:44px}
  .enum-chips .chip{display:inline-flex;align-items:center;gap:6px;
    padding:4px 9px 4px 10px;border-radius:99px;
    background:var(--bg-3);border:1px solid var(--line-2);
    font-family:var(--mono);font-size:11px;color:var(--fg-2);
    cursor:default}
  .enum-chips .chip.on{background:color-mix(in oklab, var(--accent) 18%, var(--bg-3));
    border-color:color-mix(in oklab, var(--accent) 45%, var(--line-2));
    color:var(--accent)}
  .enum-chips .chip.on .x{color:var(--accent);opacity:.7}
  .enum-chips .chip .x{display:inline-grid;place-items:center;width:14px;height:14px;
    border-radius:50%;color:var(--fg-4);cursor:default}
  .enum-chips .chip:hover{border-color:var(--line-3);color:var(--fg)}
  .enum-chips .chip.on:hover{border-color:color-mix(in oklab, var(--accent) 60%, var(--line-3))}
  .enum-chips .ec-input{flex:1;min-width:80px}
  .enum-chips .ec-input input{all:unset;width:100%;font-family:var(--mono);
    font-size:12px;color:var(--fg);padding:4px 6px}
  .enum-chips .ec-input input::placeholder{color:var(--fg-4)}

  .bool-pick{display:inline-flex;background:var(--bg-2);
    border:1px solid var(--line-2);border-radius:var(--r-md);overflow:hidden;
    height:34px}
  .bool-pick button{all:unset;padding:0 16px;font-family:var(--mono);font-size:12.5px;
    color:var(--fg-3);cursor:default;display:flex;align-items:center;gap:6px}
  .bool-pick button + button{border-left:1px solid var(--line-2)}
  .bool-pick button.on{background:var(--bg-3);color:var(--fg)}
  .bool-pick button.on.t{color:var(--accent)}
  .bool-pick button.on.f{color:var(--danger)}

  .date-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
  .date-row .arrow{font-family:var(--mono);font-size:11px;color:var(--fg-4);
    padding:0 4px}

  /* Overrides panel */

  /* Scheduled rollout timeline */
  .ramp{margin-top:18px;padding:16px;background:var(--bg-1);
    border:1px solid var(--line);border-radius:var(--r-md)}
  .ramp .ramp-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}

  .ramp .timeline{position:relative;height:54px;padding:0 12px;
    background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-md);
    margin:6px 0 12px}
  .ramp .timeline .axis{position:absolute;left:14px;right:14px;top:32px;height:2px;
    background:var(--line-2);border-radius:2px}
  .ramp .timeline .axis-fill{position:absolute;left:14px;top:32px;height:2px;
    background:var(--accent);border-radius:2px;
    box-shadow:0 0 0 1px color-mix(in oklab, var(--accent) 50%, transparent)}
  .ramp .step{position:absolute;top:13px;transform:translateX(-50%);

  .ramp .step .dot{width:16px;height:16px;border-radius:50%;

    box-shadow:0 2px 6px -1px color-mix(in oklab, var(--accent) 50%, transparent)}
  .ramp .step .dot.pending{border-color:var(--line-3);background:var(--bg-3)}
  .ramp .step .dot.current{background:var(--accent)}
  .ramp .step .pct{font-family:var(--mono);font-size:10.5px;color:var(--fg);
    margin-top:1px;font-weight:600;letter-spacing:-0.01em}
  .ramp .step .dt{font-family:var(--mono);font-size:9.5px;color:var(--fg-3);
    position:absolute;top:30px;white-space:nowrap}
  .ramp .step.pending .pct{color:var(--fg-3)}

  .ramp-rows{display:flex;flex-direction:column;gap:0;
    background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-md)}
  .ramp-rows .rr{display:grid;grid-template-columns:24px 80px 1fr auto 28px;
    gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line);
    font-size:12px}
  .ramp-rows .rr:last-child{border-bottom:none}
  .ramp-rows .rr .n{font-family:var(--mono);font-size:10px;color:var(--fg-4);
    text-align:center}
  .ramp-rows .rr .pct{font-family:var(--mono);font-size:13px;color:var(--accent);
    font-weight:600}
  .ramp-rows .rr.done .pct{color:var(--fg-3)}
  .ramp-rows .rr.done .when{color:var(--fg-3)}
  .ramp-rows .rr .when{font-family:var(--mono);font-size:11px;color:var(--fg-2)}
  .ramp-rows .rr .status{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;

  .ramp-rows .rr.live .status{color:var(--warn);

  /* Test panel: fixtures + live-eval toggle */
  .fix-row{display:flex;align-items:center;gap:6px;padding:8px 0;
    overflow-x:auto;flex-wrap:wrap}
  .fix-chip{display:inline-flex;align-items:center;gap:6px;

  .fix-chip:hover{background:var(--bg-3);color:var(--fg);border-color:var(--line-3)}

  .fix-chip.save:hover{color:var(--accent);

  .warn-list{margin-top:8px;padding:10px 12px;
    background:color-mix(in oklab, var(--warn) 8%, var(--bg-2));
    border:1px solid color-mix(in oklab, var(--warn) 28%, var(--line-2));
    border-radius:var(--r-md);font-size:11.5px}
  .warn-list .w-hd{font-family:var(--mono);font-size:10px;letter-spacing:.06em;

    text-transform:uppercase;letter-spacing:.04em;color:var(--purple);

    border:1px solid color-mix(in oklab, var(--purple) 30%, var(--line-2));

  /* History drawer */

    animation:dw-in .22s cubic-bezier(.16,.84,.44,1)}

  .ver-item{padding:14px 20px;border-bottom:1px solid var(--line);

  .ver-item:last-child{border-bottom:none}
  .ver-item.current{background:color-mix(in oklab, var(--accent) 5%, transparent)}

  .ver-item .v-state.live{color:var(--accent);

    background:color-mix(in oklab, var(--accent) 12%, transparent)}
  .ver-item .v-state.draft{color:var(--warn);
    border-color:color-mix(in oklab, var(--warn) 35%, var(--line-2));
    background:color-mix(in oklab, var(--warn) 12%, transparent)}

  /* Diff modal */
  .diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;
    border:1px solid var(--line-2);border-radius:var(--r-md);overflow:hidden}
  .diff-grid .col{display:flex;flex-direction:column;background:var(--bg-1)}

  .diff-grid .col-hd{padding:10px 14px;font-family:var(--mono);font-size:10.5px;

  /* KV staleness indicator */

  .kv-ind .dot{width:8px;height:8px;border-radius:50%;background:var(--fg-4);
