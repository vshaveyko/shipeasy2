<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Metrics · Shipeasy</title>
<meta name="viewport" content="width=1440"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css?v=3">
<link rel="stylesheet" href="forms.css?v=1">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body{min-height:100vh}

  /* ── Standard chrome ──────────────────────────────────────────── */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-top:-4px}
  .tab{padding:10px 14px;font-size:13px;color:var(--fg-3);cursor:default;
    border-bottom:1.5px solid transparent;margin-bottom:-1px}
  .tab.active{color:var(--fg);border-bottom-color:var(--accent)}
  .tab .count{margin-left:6px;font-family:var(--mono);font-size:10.5px;color:var(--fg-4)}
  .filter-row{display:flex;align-items:center;gap:10px;padding:12px 0}

  /* ── Split (carried over from standards-list-v2) ──────────────── */
  .split{display:flex;gap:0;position:relative;
    background:var(--bg-1);border:1px solid var(--line);
    border-radius:var(--r-lg);overflow:hidden;min-height:680px}
  .list-pane{flex:1 1 100%;min-width:0;position:relative;
    transition:flex 360ms cubic-bezier(.32,.72,.35,1.02),
               max-width 360ms cubic-bezier(.32,.72,.35,1.02)}
  .split.open .list-pane{flex:0 0 280px;max-width:280px;
    border-right:1px solid var(--line)}
  .pane-layer{position:absolute;inset:0;transition:opacity 200ms ease;overflow:hidden}
  .pane-layer.full-table{opacity:1;position:relative}
  .split.open .pane-layer.full-table{opacity:0;pointer-events:none;position:absolute}
  .pane-layer.rail{opacity:0;pointer-events:none;
    transition:opacity 200ms 140ms ease}
  .split.open .pane-layer.rail{opacity:1;pointer-events:auto}
  .rail-head{padding:11px 14px;border-bottom:1px solid var(--line);
    background:var(--bg-2);font-family:var(--mono);font-size:10.5px;
    letter-spacing:.06em;text-transform:uppercase;color:var(--fg-4);
    display:flex;align-items:center;gap:8px}
  .rail-body{overflow-y:auto;height:calc(100% - 42px)}
  .rail-group{padding:10px 14px 4px;font-family:var(--mono);font-size:9.5px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--fg-4);
    display:flex;align-items:center;gap:6px}
  .rail-group .c{padding:0 5px;background:var(--bg-3);border-radius:3px;
    color:var(--fg-3);border:1px solid var(--line-2);font-size:9px}
  .rail-row{display:grid;grid-template-columns:14px 1fr auto;gap:8px;
    align-items:center;padding:8px 14px;cursor:default;
    border-left:2px solid transparent;
    transition:background .12s, border-left-color .12s}
  .rail-row:hover{background:var(--bg-2)}
  .rail-row.active{background:color-mix(in oklab, var(--accent) 7%, var(--bg-2));
    border-left-color:var(--accent)}
  .rail-row .ico{width:14px;height:14px;display:grid;place-items:center}
  .rail-row .nm{font-family:var(--mono);font-size:12px;color:var(--fg);
    font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rail-row .v{font-family:var(--mono);font-size:10.5px;color:var(--fg-3)}

  .detail-pane{flex:1 1 0;min-width:0;opacity:0;
    transform:translateX(24px);pointer-events:none;position:relative;
    transition:opacity 260ms 160ms ease-out,
               transform 260ms 160ms cubic-bezier(.2,.7,.2,1)}
  .split.open .detail-pane{opacity:1;transform:none;pointer-events:auto}

  /* Close affordances — see standards-list-v2 for the spec */
  .pane-close{position:absolute;top:14px;right:14px;z-index:6;
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg-1);border:1px solid var(--line-2);
    color:var(--fg-2);cursor:default;
    box-shadow:0 1px 2px rgba(0,0,0,.18);
    opacity:0;transform:scale(.85);
    transition:opacity 200ms 220ms ease,
               transform 200ms 220ms cubic-bezier(.2,.7,.2,1),
               background .12s,color .12s,border-color .12s}
  .split.open .pane-close{opacity:1;transform:none}
  .pane-close:hover{background:var(--bg-2);color:var(--fg);
    border-color:var(--line-3)}
  .pane-close .kbd-hint{position:absolute;right:calc(100% + 8px);top:50%;
    transform:translateY(-50%);font-family:var(--mono);font-size:10.5px;
    color:var(--fg-3);background:var(--bg-1);padding:3px 7px;border-radius:4px;
    border:1px solid var(--line);white-space:nowrap;opacity:0;
    pointer-events:none;transition:opacity .15s}
  .pane-close:hover .kbd-hint{opacity:1}

  .show-full-pill{display:inline-flex;align-items:center;gap:6px;
    padding:6px 10px;border-radius:var(--r-sm);
    border:1px solid var(--line);background:var(--bg-1);
    color:var(--fg-2);font-size:12.5px;cursor:default;
    transition:background .12s,color .12s,border-color .12s}
  .show-full-pill:hover{background:var(--bg-2);color:var(--fg);
    border-color:var(--line-2)}
  .show-full-pill kbd{font-family:var(--mono);font-size:9.5px;
    padding:1px 5px;background:var(--bg-2);border-radius:3px;
    border:1px solid var(--line);color:var(--fg-4);margin-left:4px}

  .head-cluster{display:grid;grid-template-rows:1fr;
    transition:grid-template-rows 320ms cubic-bezier(.32,.72,.35,1.02),
               opacity 200ms ease}
  .head-cluster > .inner{min-height:0;overflow:hidden;
    display:flex;flex-direction:column;gap:24px}
  .head-cluster.collapsed{grid-template-rows:0fr;opacity:0;
    transition:grid-template-rows 280ms cubic-bezier(.4,0,.2,1),
               opacity 140ms ease}

  .open-head{display:flex;align-items:center;gap:14px;
    opacity:0;transform:translateY(-6px);
    transition:opacity 220ms 140ms ease, transform 220ms 140ms ease}
  body.is-open .open-head{opacity:1;transform:none}
  .open-back{display:flex;align-items:center;gap:6px;padding:6px 10px;
    border-radius:var(--r-sm);border:1px solid var(--line);
    background:var(--bg-1);color:var(--fg-2);font-size:12.5px;cursor:default;
    transition:background .12s,color .12s,border-color .12s}
  .open-back:hover{background:var(--bg-2);color:var(--fg);border-color:var(--line-2)}
  .open-head .name{font-family:var(--mono);font-size:18px;font-weight:500;
    color:var(--fg);letter-spacing:-0.005em}
  .open-head .meta{font-family:var(--mono);font-size:11px;color:var(--fg-4)}

  /* ── METRICS-SPECIFIC custom row ──────────────────────────────────
     Each metric row is two lines tall, with a sparkline that lives
     inside the row, a current value, and a tiny delta. This proves
     out the "table rows can be custom" rule — the chrome is the
     same as releases, the inner row layout is bespoke. */
  .met-tbl{width:100%;border-collapse:collapse;font-size:13px;
    table-layout:fixed}
  .met-tbl thead th{text-align:left;padding:10px 14px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--fg-4);font-weight:500;
    border-bottom:1px solid var(--line);background:var(--bg-2);
    position:sticky;top:0;z-index:1}
  .met-tbl tbody tr{transition:background .15s;cursor:default}
  .met-tbl tbody tr:hover{background:var(--bg-2)}
  .met-tbl tbody tr.row-pressing{
    background:color-mix(in oklab, var(--accent) 6%, transparent);
    transform:translateX(2px);
    transition:transform 80ms ease,background 80ms ease}
  .met-tbl td{padding:14px 14px;border-bottom:1px solid var(--line);
    vertical-align:middle}
  .met-tbl .col-icon{width:30px;padding-right:0}
  .met-tbl .col-name{width:auto}
  .met-tbl .col-spark{width:240px}
  .met-tbl .col-val{width:130px;text-align:right;font-variant-numeric:tabular-nums}
  .met-tbl .col-delta{width:100px;text-align:right;font-variant-numeric:tabular-nums}
  .met-tbl .col-bucket{width:120px}
  .met-tbl .col-actions{width:40px;text-align:right}

  .met-name{display:flex;flex-direction:column;gap:3px;min-width:0}
  .met-name .k{font-family:var(--mono);font-size:12.5px;color:var(--fg);
    font-weight:500;display:flex;align-items:center;gap:8px;min-width:0}
  .met-name .k b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .met-name .d{font-size:11.5px;color:var(--fg-3);line-height:1.45;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .met-spark-wrap{height:44px;position:relative;
    background:linear-gradient(180deg,
      color-mix(in oklab, var(--accent) 4%, transparent), transparent);
    border-radius:var(--r-sm);overflow:hidden}
  .met-spark-wrap svg{width:100%;height:100%;display:block}
  .met-value .v{font-size:18px;font-weight:500;font-family:var(--mono);
    letter-spacing:-0.01em;line-height:1}
  .met-value .u{font-family:var(--mono);font-size:11px;color:var(--fg-3);
    margin-left:3px}
  .met-value .since{font-family:var(--mono);font-size:10px;
    color:var(--fg-4);letter-spacing:.04em;margin-top:3px}

  .delta-chip{display:inline-flex;align-items:center;gap:3px;
    padding:2px 7px;border-radius:4px;font-family:var(--mono);
    font-size:11px;font-weight:500}
  .delta-chip.up{background:color-mix(in oklab, var(--accent) 14%, transparent);
    color:var(--accent)}
  .delta-chip.dn{background:color-mix(in oklab, var(--danger) 14%, transparent);
    color:var(--danger)}
  .delta-chip.flat{background:var(--bg-3);color:var(--fg-3)}

  .bucket-row{display:flex;flex-direction:column;gap:4px;min-width:0}
  .bucket-row .b-label{font-family:var(--mono);font-size:10.5px;color:var(--fg-3);
    display:flex;align-items:center;gap:6px}
  .bucket-row .bar{height:5px;background:var(--bg-3);border-radius:3px;overflow:hidden}
  .bucket-row .bar > i{display:block;height:100%;background:var(--accent)}
  .bucket-row.bad .bar > i{background:var(--danger)}
  .bucket-row.warn .bar > i{background:var(--warn)}
  .bucket-row.info .bar > i{background:var(--info)}

  /* ── Group header rows in the table (cohort labels) ─────────── */
  .met-group-row td{padding:10px 14px;
    background:var(--bg-2);border-bottom:1px solid var(--line);
    font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--fg-4)}
  .met-group-row td b{color:var(--fg-2);font-weight:500}
  .met-group-row td .gpill{margin-left:8px;padding:1px 6px;background:var(--bg-3);
    border-radius:3px;color:var(--fg-3);border:1px solid var(--line)}

  /* ── Detail content ─────────────────────────────────────────── */
  .detail-scroll{padding:24px 28px;display:flex;flex-direction:column;
    gap:20px;max-height:780px;overflow-y:auto}
  .det-hero{display:flex;flex-direction:column;gap:12px}
  .det-hero h2{margin:0;font-size:24px;font-weight:500;letter-spacing:-0.02em;
    font-family:var(--mono)}
  .det-hero p{margin:0;font-size:13px;color:var(--fg-2);line-height:1.55;
    max-width:64ch;text-wrap:pretty}
  .det-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;
    background:var(--bg-2);border:1px solid var(--line);
    border-radius:var(--r-md);overflow:hidden}
  .det-stat{padding:14px 16px;border-right:1px solid var(--line)}
  .det-stat:last-child{border-right:none}
  .det-stat .k{font-family:var(--mono);font-size:10px;
    letter-spacing:.06em;text-transform:uppercase;color:var(--fg-4)}
  .det-stat .v{font-size:22px;font-weight:500;font-family:var(--mono);margin-top:4px}
  .det-stat .d{font-family:var(--mono);font-size:10.5px;color:var(--fg-3);margin-top:2px}
  .det-card{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-md)}
  .det-card .hd{padding:12px 16px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;background:var(--bg-2)}
  .det-card .hd b{font-size:12.5px;font-weight:500}
  .det-card .bd{padding:14px 16px}
  .chart-big{height:220px;width:100%}
  .chart-big svg{width:100%;height:100%}

  .bd-list{display:grid;grid-template-columns:1fr auto auto;gap:12px;
    font-size:12.5px;font-family:var(--mono)}
  .bd-list .head{font-size:10.5px;color:var(--fg-4);
    letter-spacing:.06em;text-transform:uppercase;
    padding-bottom:6px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .bd-row{display:contents}
  .bd-row .l{color:var(--fg-2);padding:6px 0}
  .bd-row .c{color:var(--fg);padding:6px 0;text-align:right}
  .bd-row .p{color:var(--fg-3);padding:6px 0;text-align:right}
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="icons-ext.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

// ── Metric records ────────────────────────────────────────────────
const metrics = [
  // group · web vitals (auto-collected)
  { id:'page_load_p75', group:'web_vitals', name:'page_load · p75',
    desc:'75th-percentile time to first contentful paint',
    unit:'s', val:1.42, prev:1.62, delta:-12.3,
    bucket:{ label:'good', val:78, kind:'good' },
    spark:[1.70,1.65,1.60,1.55,1.50,1.50,1.48,1.45,1.42,1.42,1.40,1.42], kind:'auto' },
  { id:'inp_p75', group:'web_vitals', name:'inp · p75',
    desc:'Interaction to next paint · p75 across all sessions',
    unit:'ms', val:128, prev:144, delta:-11.1,
    bucket:{ label:'good', val:82, kind:'good' },
    spark:[160,156,152,148,144,138,134,132,130,129,128,128], kind:'auto' },
  { id:'cls_p75', group:'web_vitals', name:'cls · p75',
    desc:'Cumulative layout shift · target ≤ 0.10',
    unit:'', val:0.08, prev:0.07, delta:+14.3,
    bucket:{ label:'good', val:88, kind:'good' },
    spark:[0.04,0.05,0.05,0.06,0.06,0.07,0.07,0.07,0.08,0.08,0.08,0.08], kind:'auto' },

  // group · errors
  { id:'errors_per_session', group:'errors', name:'errors · per session',
    desc:'Unhandled exceptions / session · last 24h',
    unit:'', val:0.014, prev:0.022, delta:-36.4,
    bucket:{ label:'within budget', val:42, kind:'info' },
    spark:[0.030,0.028,0.025,0.022,0.020,0.018,0.017,0.016,0.015,0.014,0.014,0.014], kind:'auto' },
  { id:'p99_api_latency', group:'errors', name:'api · p99 latency',
    desc:'Server-side API · 99th percentile · all endpoints',
    unit:'ms', val:482, prev:340, delta:+41.8,
    bucket:{ label:'over budget', val:96, kind:'bad' },
    spark:[330,340,345,350,360,370,400,420,440,460,475,482], kind:'auto', alert:true },

  // group · activation
  { id:'user_startcheckout', group:'activation', name:'user_startcheckout',
    desc:'Custom event · started checkout · all surfaces',
    unit:'', val:12840, prev:11860, delta:+8.2,
    bucket:{ label:'27% of sessions', val:27, kind:'good' },
    spark:[10200,10800,11000,11400,11860,12000,12100,12300,12500,12700,12840,12840], kind:'custom' },
  { id:'user_signup', group:'activation', name:'user_signup',
    desc:'Custom event · new account created',
    unit:'', val:1420, prev:1380, delta:+2.9,
    bucket:{ label:'3.2% of visitors', val:3.2, kind:'info' },
    spark:[1300,1320,1340,1350,1370,1380,1390,1400,1410,1410,1420,1420], kind:'custom' },

  // group · revenue
  { id:'revenue_per_visitor', group:'revenue', name:'revenue_per_visitor',
    desc:'Custom event · cumulative revenue / unique visitor',
    unit:'$', val:4.82, prev:4.41, delta:+9.3,
    bucket:{ label:'+$0.41 vs. last 7d', val:74, kind:'good' },
    spark:[3.90,4.00,4.10,4.20,4.30,4.40,4.45,4.50,4.60,4.70,4.78,4.82], kind:'custom' },
  { id:'cart_abandoned', group:'revenue', name:'cart_abandoned',
    desc:'Custom event · cart populated but not paid',
    unit:'%', val:62.1, prev:63.8, delta:-2.7,
    bucket:{ label:'budget · ≤ 60%', val:78, kind:'warn' },
    spark:[64.0,63.8,63.5,63.4,63.2,63.0,62.8,62.6,62.4,62.2,62.1,62.1], kind:'custom' },
];

const GROUP_LABELS = {
  web_vitals: 'Web vitals · auto-collected',
  errors:     'Errors · auto-collected',
  activation: 'Activation · custom events',
  revenue:    'Revenue · custom events',
};
const GROUP_COUNTS = metrics.reduce((acc, m) => {
  acc[m.group] = (acc[m.group]||0)+1; return acc;
}, {});

// ── Spark in row ──────────────────────────────────────────────────
function MetSpark({ data, neg=false, alert=false, h=44, w=220 }) {
  const pad = 4;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v,i) => {
    const x = pad + (i/(data.length-1))*(w-pad*2);
    const y = pad + (1 - (v-min)/range)*(h-pad*2);
    return [x,y];
  });
  const line = pts.map(([x,y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
  const fill = `${pad},${h-pad} ${line} ${w-pad},${h-pad}`;
  const stroke = alert ? 'var(--danger)' : neg ? 'var(--warn)' : 'var(--accent)';
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="msg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={stroke} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={stroke} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={fill} fill="url(#msg)"/>
      <polyline points={line} fill="none" stroke={stroke}
        strokeWidth="1.4" strokeLinejoin="round" strokeLinecap="round"/>
      {/* terminal dot */}
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={stroke}/>
    </svg>
  );
}

function DeltaChip({ d }) {
  if (d == null) return <span className="delta-chip flat">—</span>;
  const up = d > 0, dn = d < 0;
  // For metrics where down is better (latency, errors), color flips.
  // Demo: just use sign — real impl reads polarity per metric.
  const cls = up ? 'up' : dn ? 'dn' : 'flat';
  return <span className={`delta-chip ${cls}`}>
    {up ? '▲' : dn ? '▼' : '·'} {Math.abs(d).toFixed(1)}%
  </span>;
}

function fmtVal(v, unit) {
  if (unit === '$') return '$' + v.toFixed(2);
  if (unit === '%') return v.toFixed(1) + '%';
  if (unit === 's') return v.toFixed(2);
  if (unit === 'ms') return Math.round(v).toLocaleString();
  if (v >= 1000) return v.toLocaleString();
  if (v < 1 && v > 0) return v.toFixed(3);
  return v.toFixed(1);
}

// ── Big detail chart ──────────────────────────────────────────────
function BigChart({ data, neg=false, alert=false }) {
  if (!data) return null;
  const W = 760, H = 220, pad = 14;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v,i) => {
    const x = pad + (i/(data.length-1))*(W-pad*2);
    const y = pad + (1 - (v-min)/range)*(H-pad*2);
    return [x,y];
  });
  const line = pts.map(([x,y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
  const fill = `${pad},${H-pad} ${line} ${W-pad},${H-pad}`;
  const stroke = alert ? 'var(--danger)' : neg ? 'var(--warn)' : 'var(--accent)';
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={stroke} stopOpacity="0.30"/>
          <stop offset="100%" stopColor={stroke} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0.25,0.5,0.75].map(t => (
        <line key={t} x1={pad} x2={W-pad}
          y1={pad+t*(H-pad*2)} y2={pad+t*(H-pad*2)}
          stroke="var(--line)" strokeWidth="0.5"/>
      ))}
      <polygon points={fill} fill="url(#bg)"/>
      <polyline points={line} fill="none" stroke={stroke}
        strokeWidth="1.6" strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map(([x,y],i) => (
        <circle key={i} cx={x} cy={y}
          r={i === pts.length-1 ? 3.2 : 0}
          fill={stroke}/>
      ))}
    </svg>
  );
}

function Detail({ m }) {
  return (
    <div className="detail-scroll">
      <div className="det-hero">
        <div className="t-caps dim-2">
          {GROUP_LABELS[m.group]} · {m.kind === 'auto' ? 'auto-collected' : 'custom event'}
        </div>
        <h2>{m.name}</h2>
        <p>{m.desc}</p>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <span className={`badge ${m.alert ? 'badge-killed' : 'badge-live'}`}>
            <span className="dot"/>{m.alert ? 'OVER BUDGET' : 'WITHIN BUDGET'}
          </span>
          <span className="t-mono-xs dim-2">env · prod</span>
          <span className="t-mono-xs dim-2">·</span>
          <span className="t-mono-xs dim-2">retention · 90d</span>
        </div>
      </div>

      <div className="det-stats">
        <div className="det-stat">
          <div className="k">Current</div>
          <div className="v">{fmtVal(m.val, m.unit)}</div>
          <div className="d">latest sample · 38s ago</div>
        </div>
        <div className="det-stat">
          <div className="k">Change · 7d</div>
          <div className="v" style={{color:
            m.delta > 5 ? 'var(--accent)' :
            m.delta < -5 ? 'var(--danger)' : 'var(--fg)'}}>
            {m.delta > 0 ? '+' : ''}{m.delta.toFixed(1)}%
          </div>
          <div className="d">vs. previous week</div>
        </div>
        <div className="det-stat">
          <div className="k">Samples · 24h</div>
          <div className="v">38.1k</div>
          <div className="d">unique users · 12.4k</div>
        </div>
        <div className="det-stat">
          <div className="k">SLA</div>
          <div className="v">{m.bucket.val}%</div>
          <div className="d">{m.bucket.label}</div>
        </div>
      </div>

      <div className="det-card">
        <div className="hd">
          <IconChart size={11} style={{color:'var(--fg-3)'}}/>
          <b>Last 90 days</b>
          <span className="t-mono-xs dim-2" style={{marginLeft:'auto'}}>
            granularity · 1h · auto
          </span>
        </div>
        <div className="bd" style={{padding:0}}>
          <div className="chart-big">
            <BigChart data={m.spark.concat(m.spark).concat(m.spark)}
              neg={m.delta < 0 && m.group !== 'web_vitals' && m.group !== 'errors'}
              alert={m.alert}/>
          </div>
        </div>
      </div>

      <div className="det-card">
        <div className="hd">
          <IconFilter size={11} style={{color:'var(--fg-3)'}}/>
          <b>Breakdown · by device</b>
          <span className="t-mono-xs dim-2" style={{marginLeft:'auto'}}>
            try: country · plan · cohort
          </span>
        </div>
        <div className="bd">
          <div className="bd-list">
            <span className="head">Slice</span>
            <span className="head" style={{textAlign:'right'}}>Value</span>
            <span className="head" style={{textAlign:'right'}}>Share</span>
            <div className="bd-row">
              <span className="l">desktop · chrome</span>
              <span className="c">{fmtVal(m.val * 0.92, m.unit)}</span>
              <span className="p">52%</span>
            </div>
            <div className="bd-row">
              <span className="l">mobile · safari</span>
              <span className="c">{fmtVal(m.val * 1.18, m.unit)}</span>
              <span className="p">31%</span>
            </div>
            <div className="bd-row">
              <span className="l">desktop · firefox</span>
              <span className="c">{fmtVal(m.val * 0.96, m.unit)}</span>
              <span className="p">12%</span>
            </div>
            <div className="bd-row">
              <span className="l">mobile · chrome</span>
              <span className="c">{fmtVal(m.val * 1.06, m.unit)}</span>
              <span className="p">5%</span>
            </div>
          </div>
        </div>
      </div>

      <div className="det-card">
        <div className="hd">
          <IconCode size={11} style={{color:'var(--fg-3)'}}/>
          <b>SDK reference</b>
        </div>
        <div className="bd" style={{fontFamily:'var(--mono)',fontSize:11.5,
          color:'var(--fg-2)',lineHeight:1.7,whiteSpace:'pre-wrap'}}>
{m.kind === 'auto'
  ? `// Auto-collected — no instrumentation required.
shipeasy.metric(`+ '"'+m.id+'"'+`).latest();`
  : `// Custom event — call log() once.
shipeasy.log(`+ '"'+m.id+'"'+`, { value: 1, tags: { plan: "team" } });`
}
        </div>
      </div>
    </div>
  );
}

// ── Main page ─────────────────────────────────────────────────────
function MetricsList({ initialOpen = null }) {
  const [openId, setOpenId] = useState(initialOpen);
  const [pressing, setPressing] = useState(null);
  const isOpen = openId !== null;
  const activeMet = isOpen ? metrics.find(m => m.id === openId) : null;

  useEffect(() => {
    document.body.classList.toggle('is-open', isOpen);
  }, [isOpen]);

  useEffect(() => {
    if (!isOpen) return;
    const h = e => { if (e.key === 'Escape') setOpenId(null); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [isOpen]);

  function selectRow(id) {
    setPressing(id);
    setTimeout(() => { setOpenId(id); setPressing(null); }, 60);
  }

  // Group rows for rendering
  const grouped = ['web_vitals','errors','activation','revenue'].map(g => ({
    group: g, items: metrics.filter(m => m.group === g),
  }));

  return (
    <div className="app">
      <Sidebar active="metrics"/>
      <div>
        <Topbar
          crumbs={isOpen
            ? ['Acme Co.', 'Metrics', activeMet.id]
            : ['Acme Co.', 'Metrics']}
          actions={<>
            <button className="btn btn-secondary"><IconSparkles size={12}/> Ask Claude</button>
            <button className="btn btn-primary"><IconPlus size={12}/> New custom event</button>
          </>}
        />
        <div className="page">

          <div className={`head-cluster ${isOpen?'collapsed':''}`}>
            <div className="inner">
              <div className="page-head">
                <div>
                  <div className="t-caps dim-2" style={{marginBottom:8}}>
                    {metrics.length} metrics · 38.1M events / day · last sample 38s ago
                  </div>
                  <h1>Metrics</h1>
                  <p>Web vitals and errors are auto-collected by the SDK. Custom events are anything else you want to track — call <span className="t-mono">log("event_name")</span> from anywhere in your app.</p>
                </div>
                <div className="flex gap-3">
                  <div className="stat-block" style={{textAlign:'right'}}>
                    <div className="stat-k">Auto</div>
                    <div className="stat-v num">5</div>
                  </div>
                  <div style={{width:1,background:'var(--line)'}}/>
                  <div className="stat-block" style={{textAlign:'right'}}>
                    <div className="stat-k">Custom</div>
                    <div className="stat-v num">4</div>
                  </div>
                  <div style={{width:1,background:'var(--line)'}}/>
                  <div className="stat-block" style={{textAlign:'right'}}>
                    <div className="stat-k">Alerts</div>
                    <div className="stat-v num" style={{color:'var(--danger)'}}>1</div>
                  </div>
                </div>
              </div>
              <div className="tabs">
                <div className="tab active">All <span className="count">{metrics.length}</span></div>
                <div className="tab">Web vitals <span className="count">3</span></div>
                <div className="tab">Errors <span className="count">2</span></div>
                <div className="tab">Activation <span className="count">2</span></div>
                <div className="tab">Revenue <span className="count">2</span></div>
              </div>
              <div className="filter-row" style={{paddingBottom:0}}>
                <div className="input" style={{width:240}}>
                  <IconSearch size={12} style={{color:'var(--fg-3)'}}/>
                  <input placeholder="Filter by name or tag"/>
                </div>
                <button className="btn btn-ghost btn-sm"><IconFilter size={11}/> Source</button>
                <button className="btn btn-ghost btn-sm"><IconFilter size={11}/> Owner</button>
                <button className="btn btn-ghost btn-sm"><IconClock size={11}/> Range: 7d</button>
                <div className="ml-auto flex gap-2">
                  <button className="btn btn-ghost btn-sm">Sort: Recent</button>
                  <button className="btn btn-secondary btn-sm"><IconCode size={11}/> Export</button>
                </div>
              </div>
            </div>
          </div>

          {isOpen && (
            <div className="open-head">
              <button className="open-back" onClick={() => setOpenId(null)}>
                <IconChevronLeft size={12}/> All metrics
              </button>
              <button className="show-full-pill" onClick={() => setOpenId(null)} title="Show full table">
                <IconChart size={11}/> Show full table <kbd>Esc</kbd>
              </button>
              <span className="name">{activeMet.id}</span>
              <span className="tag" style={{fontSize:10.5,padding:'1px 6px'}}>
                {activeMet.kind === 'auto' ? 'auto' : 'custom'}
              </span>
              <span className="meta">{GROUP_LABELS[activeMet.group]}</span>
              <div className="ml-auto flex gap-2 items-center">
                <button className="btn btn-ghost btn-sm">
                  <IconBell size={11}/> Alert
                </button>
                <button className="btn btn-ghost btn-sm">
                  <IconEdit size={11}/> Edit
                </button>
                <button className="btn btn-ghost btn-sm">
                  <IconMore size={11}/>
                </button>
              </div>
            </div>
          )}

          {/* Split */}
          <div className={`split ${isOpen?'open':'closed'}`}>

            <div className="list-pane">
              {/* Full table — custom metric rows */}
              <div className="pane-layer full-table">
                <table className="met-tbl">
                  <thead>
                    <tr>
                      <th className="col-icon"></th>
                      <th className="col-name">Metric</th>
                      <th className="col-spark">Trend · 12h</th>
                      <th className="col-val" style={{textAlign:'right'}}>Current</th>
                      <th className="col-delta" style={{textAlign:'right'}}>Δ 7d</th>
                      <th className="col-bucket">SLA / target</th>
                      <th className="col-actions"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {grouped.map(g => (
                      <React.Fragment key={g.group}>
                        <tr className="met-group-row">
                          <td colSpan={7}>
                            <b>{GROUP_LABELS[g.group]}</b>
                            <span className="gpill">{g.items.length}</span>
                          </td>
                        </tr>
                        {g.items.map(m => (
                          <tr key={m.id}
                            className={pressing === m.id ? 'row-pressing' : ''}
                            onClick={() => selectRow(m.id)}>
                            <td className="col-icon">
                              {m.alert
                                ? <IconAlert size={13} style={{color:'var(--danger)'}}/>
                                : <IconChart size={13} style={{color:
                                    m.kind==='auto'?'var(--info)':'var(--accent)'}}/>}
                            </td>
                            <td>
                              <div className="met-name">
                                <span className="k"><b>{m.name}</b>
                                  {m.alert && <span className="badge badge-killed"
                                    style={{padding:'1px 6px'}}>
                                    <span className="dot"/>ALERT</span>}
                                </span>
                                <span className="d">{m.desc}</span>
                              </div>
                            </td>
                            <td>
                              <div className="met-spark-wrap">
                                <MetSpark data={m.spark}
                                  neg={m.delta < 0 && m.group !== 'web_vitals' && m.group !== 'errors'}
                                  alert={m.alert}/>
                              </div>
                            </td>
                            <td>
                              <div className="met-value">
                                <span className="v">{fmtVal(m.val, m.unit)}</span>
                                {m.unit && m.unit !== '$' && m.unit !== '%' &&
                                  <span className="u">{m.unit}</span>}
                                <div className="since">last · 38s ago</div>
                              </div>
                            </td>
                            <td><DeltaChip d={m.delta}/></td>
                            <td>
                              <div className={`bucket-row ${m.bucket.kind}`}>
                                <div className="b-label">
                                  {m.bucket.label}
                                </div>
                                <div className="bar"><i style={{width:m.bucket.val+'%'}}/></div>
                              </div>
                            </td>
                            <td>
                              <button className="btn btn-ghost btn-icon btn-sm"
                                onClick={e => e.stopPropagation()}>
                                <IconMore size={12}/>
                              </button>
                            </td>
                          </tr>
                        ))}
                      </React.Fragment>
                    ))}
                  </tbody>
                </table>
              </div>

              {/* Rail */}
              <div className="pane-layer rail">
                <div className="rail-head">
                  <span>Metrics</span>
                  <span className="ml-auto" style={{
                    fontFamily:'var(--mono)',fontSize:9.5,padding:'1px 5px',
                    background:'var(--bg-3)',color:'var(--fg-3)',
                    borderRadius:3,border:'1px solid var(--line)'}}>
                    {metrics.length}
                  </span>
                </div>
                <div className="rail-body">
                  {grouped.map(g => (
                    <div key={g.group}>
                      <div className="rail-group">
                        <span>{GROUP_LABELS[g.group].split(' · ')[0]}</span>
                        <span className="c">{g.items.length}</span>
                      </div>
                      {g.items.map(m => (
                        <div key={m.id}
                          className={`rail-row ${m.id===openId?'active':''}`}
                          onClick={() => setOpenId(m.id)}>
                          <div className="ico">
                            {m.alert
                              ? <IconAlert size={11} style={{color:'var(--danger)'}}/>
                              : <IconChart size={11} style={{color:
                                  m.kind==='auto'?'var(--info)':'var(--accent)'}}/>}
                          </div>
                          <div className="nm">{m.name}</div>
                          <span className="v">{fmtVal(m.val, m.unit)}</span>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="detail-pane">
              <button className="pane-close" onClick={() => setOpenId(null)} title="Show full table (Esc)">
                <IconX size={13}/>
                <span className="kbd-hint">Show full table · Esc</span>
              </button>
              {activeMet && <Detail m={activeMet}/>}
            </div>
          </div>

          {!isOpen && (
            <div className="card-foot" style={{
              border:'1px solid var(--line)',borderTop:'none',
              borderRadius:'0 0 var(--r-lg) var(--r-lg)',marginTop:-12}}>
              <span className="t-mono-xs dim-2">9 of {metrics.length} shown · sampling every 60s</span>
              <div className="ml-auto flex gap-2">
                <button className="btn btn-ghost btn-sm">Previous</button>
                <button className="btn btn-ghost btn-sm">Next</button>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

// URL param: ?open=<id>
const urlOpen = new URLSearchParams(location.search).get('open');
ReactDOM.createRoot(document.getElementById('app')).render(
  <MetricsList initialOpen={urlOpen}/>
);
</script>
</body>
</html>
