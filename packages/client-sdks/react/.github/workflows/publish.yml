name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check
      - run: pnpm run test
      - run: pnpm run build

      - name: Publish @shipeasy/react to npm
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "@shipeasy/react@$PKG_VERSION" version 2>/dev/null | grep -q "$PKG_VERSION"; then
            echo "Already published: @shipeasy/react@$PKG_VERSION"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
