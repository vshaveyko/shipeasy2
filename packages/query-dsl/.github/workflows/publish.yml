name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: "Inline workspace: deps to registry semver"
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const k of ['dependencies','devDependencies','peerDependencies']) {
              if (!p[k]) continue;
              for (const dep of Object.keys(p[k])) {
                const v = p[k][dep];
                p[k][dep] = v
                  .replace(/^workspace:\\^/, '^')
                  .replace(/^workspace:~/, '~')
                  .replace(/^workspace:\\*$/, 'latest')
                  .replace(/^workspace:/, '');
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm run build

      - name: Publish to npm
        run: |
          NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$PKG_VERSION" version 2>/dev/null | grep -q "$PKG_VERSION"; then
            echo "Already published: $NAME@$PKG_VERSION"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
