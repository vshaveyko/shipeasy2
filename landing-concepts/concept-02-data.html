      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fbfbfa;
        --surface: #ffffff;
        --ink: #0a0a0f;
        --ink-2: #40404a;
        --ink-3: #7a7a85;
        --line: #ececee;
        --line-strong: #d6d6da;
        --accent: #2546f0;
        --accent-2: #dce4ff;
        --success: #0f9d58;
        --success-2: #e6f4ec;
        --warn: #d97706;
        --danger: #d92d20;
      }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: "Inter", system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.55;
      }
      .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
      .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

      .nav {
        position: sticky; top: 0; z-index: 50;
        background: rgba(251, 251, 250, 0.8); backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
      }
      .nav-inner { display: flex; align-items: center; height: 60px; gap: 28px; }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: -0.02em; }
      .brand .mark {
        width: 22px; height: 22px; border-radius: 6px;
        background: linear-gradient(135deg, var(--accent) 0%, #7a3cf0 100%);
      }
      .nav-links { display: flex; gap: 24px; font-size: 14px; color: var(--ink-2); }
      .nav-links a:hover { color: var(--ink); }
      .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

      .btn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 9px 15px; border-radius: 8px; font-size: 14px; font-weight: 500;
        border: 1px solid transparent; transition: 0.15s;
      }
      .btn-primary { background: var(--ink); color: var(--surface); }
      .btn-primary:hover { background: #1c1c22; }
      .btn-accent { background: var(--accent); color: white; }
      .btn-accent:hover { background: #1a34d0; }
      .btn-outline { border-color: var(--line-strong); color: var(--ink); background: var(--surface); }
      .btn-ghost { color: var(--ink-2); }
      .btn-ghost:hover { color: var(--ink); }

      /* Hero */
      .hero { padding: 80px 0 40px; }
      .eyebrow {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 5px 10px 5px 5px; background: var(--surface);
        border: 1px solid var(--line); border-radius: 100px;
        font-size: 12px; font-weight: 500;
      }
      .eyebrow .chip {
        padding: 3px 8px; background: var(--accent-2); color: var(--accent);
        border-radius: 100px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
      }
      .headline {
        margin: 24px 0 18px; font-size: clamp(40px, 5.6vw, 68px);
        font-weight: 700; letter-spacing: -0.035em; line-height: 1.04; max-width: 980px;
      }
      .headline .u {
        background: linear-gradient(180deg, transparent 64%, var(--accent-2) 64%);
      }
      .sub { color: var(--ink-2); font-size: 19px; max-width: 600px; line-height: 1.45; }
      .cta-row { display: flex; gap: 10px; margin-top: 28px; align-items: center; }
      .cta-meta { color: var(--ink-3); font-size: 13px; }

      /* Dashboard mock */
      .dash {
        margin-top: 60px; background: var(--surface);
        border: 1px solid var(--line); border-radius: 16px;
        box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 24px 48px -16px rgba(0,0,0,0.12);
        overflow: hidden;
      }
      .dash-top {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 16px; border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, #fcfcfb 0%, var(--surface) 100%);
      }
      .dot-row { display: flex; gap: 6px; }
      .dot-row span { width: 11px; height: 11px; border-radius: 50%; background: var(--line-strong); }
      .dash-crumb {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 12px; color: var(--ink-3);
      }
      .dash-crumb b { color: var(--ink); font-weight: 500; }
      .dash-body { display: grid; grid-template-columns: 220px 1fr; min-height: 520px; }
      @media (max-width: 820px) { .dash-body { grid-template-columns: 1fr; } }

      .dash-side { border-right: 1px solid var(--line); padding: 16px 12px; background: #fafafa; }
      .side-section { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); padding: 8px 10px 4px; }
      .side-item { padding: 7px 10px; border-radius: 6px; font-size: 13px; color: var(--ink-2); display: flex; gap: 8px; align-items: center; cursor: pointer; }
      .side-item:hover { background: var(--surface); }
      .side-item.active { background: var(--accent-2); color: var(--accent); font-weight: 500; }
      .side-item .ic { width: 14px; height: 14px; border-radius: 3px; background: currentColor; opacity: 0.7; }

      .dash-main { padding: 24px 28px; }
      .exp-head { display: flex; align-items: baseline; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
      .exp-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
      .exp-meta { font-size: 13px; color: var(--ink-3); margin-top: 4px; }
      .verdict {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 6px 12px; background: var(--success-2); color: var(--success);
        border-radius: 100px; font-size: 13px; font-weight: 600;
      }
      .verdict::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
      .agent-tag {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 3px 9px; background: rgba(37, 70, 240, 0.08);
        color: var(--accent); border: 1px solid rgba(37, 70, 240, 0.2);
        border-radius: 100px; font-family: "JetBrains Mono", monospace;
        font-size: 11px; font-weight: 500; margin-top: 6px;
      }
      .agent-tag::before {
        content: ""; width: 14px; height: 14px; border-radius: 50%;
        background: linear-gradient(135deg, #7a3cf0, var(--accent));
      }

      .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 24px 0; }
      @media (max-width: 820px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
      .kpi {
        padding: 14px 16px; background: var(--surface);
        border: 1px solid var(--line); border-radius: 10px;
      }
      .kpi-l { font-size: 12px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em; }
      .kpi-v { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin-top: 4px; }
      .kpi-d { font-size: 12px; margin-top: 4px; }
      .kpi-d.up { color: var(--success); }
      .kpi-d.down { color: var(--danger); }

      .chart {
        height: 220px; background: var(--surface);
        border: 1px solid var(--line); border-radius: 10px; padding: 16px; position: relative;
      }
      .chart-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
      .chart-sub { font-size: 12px; color: var(--ink-3); margin-bottom: 12px; }
      .chart svg { width: 100%; height: 140px; overflow: visible; }
      .ci-band { fill: rgba(37, 70, 240, 0.12); }
      .ci-band-2 { fill: rgba(15, 157, 88, 0.15); }
      .series-a { stroke: var(--ink-3); }
      .series-b { stroke: var(--accent); }
      .series-c { stroke: var(--success); }
      .series { fill: none; stroke-width: 2; }

      .variants { margin-top: 18px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); overflow: hidden; }
      .variants table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .variants th, .variants td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--line); }
      .variants th { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-3); background: #fafafa; }
      .variants tr:last-child td { border-bottom: 0; }
      .variant-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
      .var-a { background: var(--ink-3); }
      .var-b { background: var(--accent); }
      .var-c { background: var(--success); }
      .winner { font-weight: 600; color: var(--success); }

      /* Feature strip */
      .strip-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-3); margin: 64px 0 20px; }
      .logos { display: flex; flex-wrap: wrap; gap: 32px; align-items: center; font-size: 18px; font-weight: 600; color: var(--ink-2); letter-spacing: -0.02em; opacity: 0.6; }

      /* Three-up feature */
      .trio { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 80px 0; }
      @media (max-width: 820px) { .trio { grid-template-columns: 1fr; } }
      .card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 28px; }
      .card h3 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 8px; }
      .card p { color: var(--ink-2); font-size: 14px; line-height: 1.55; }
      .card .preview {
        margin: -28px -28px 20px; padding: 20px; height: 140px;
        background: linear-gradient(180deg, var(--accent-2), transparent), #f3f5fc;
        border-bottom: 1px solid var(--line);
        display: flex; align-items: center; justify-content: center;
      }

      /* Comparison table */
      .compare { padding: 40px 0 80px; }
      .sec-title { font-size: 36px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 12px; line-height: 1.1; }
      .sec-sub { color: var(--ink-2); font-size: 17px; max-width: 560px; margin-bottom: 36px; }
      .ctable {
        width: 100%; border-collapse: collapse; background: var(--surface);
        border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
      }
      .ctable th, .ctable td { padding: 14px 18px; text-align: center; border-bottom: 1px solid var(--line); font-size: 14px; }
      .ctable th:first-child, .ctable td:first-child { text-align: left; font-weight: 500; }
      .ctable th { background: #fafafa; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); font-weight: 500; }
      .ctable tr:last-child td { border-bottom: 0; }
      .ctable .our { background: rgba(37, 70, 240, 0.035); }
      .ctable .our-head { background: var(--accent-2); color: var(--accent); }
      .check { color: var(--success); font-weight: 700; }
      .cross { color: var(--ink-3); }

      /* CTA */
      .bigcta { padding: 56px; background: var(--ink); color: var(--bg); border-radius: 20px; margin: 40px 0; text-align: center; }
      .bigcta h2 { font-size: 44px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 14px; }
      .bigcta p { color: #b3b3bc; margin-bottom: 28px; font-size: 17px; }

      footer { border-top: 1px solid var(--line); padding: 32px 0 40px; color: var(--ink-3); font-size: 13px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; }

      .locale-picker button { color: var(--ink-3); }
      .locale-picker button.is-active { color: var(--accent); }
    </style>
