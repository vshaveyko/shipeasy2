    <link rel="stylesheet" href="_shared/reset.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0b1220;
        --bg-2: #101a2e;
        --surface: #142140;
        --line: rgba(148, 163, 184, 0.14);
        --line-2: rgba(148, 163, 184, 0.22);
        --fg: #e2e8f0;
        --fg-2: #94a3b8;
        --fg-3: #64748b;
        --accent: #38bdf8;
        --accent-2: #0ea5e9;
        --gold: #fbbf24;
        --green: #34d399;
        --red: #f87171;
      }
      body {
        background:
          radial-gradient(ellipse at top, rgba(56, 189, 248, 0.08), transparent 50%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
        background-attachment: fixed;
        color: var(--fg);
        font-family: "Inter", system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.6;
      }
      .mono { font-family: "IBM Plex Mono", monospace; }
      .container { max-width: 1280px; margin: 0 auto; padding: 0 28px; }

      /* Top bar */
      .topbar {
        border-bottom: 1px solid var(--line);
        font-size: 12px; color: var(--fg-2);
        background: rgba(11, 18, 32, 0.6);
      }
      .topbar-inner {
        height: 36px; display: flex; align-items: center; gap: 22px;
      }
      .topbar-inner a { color: var(--fg-2); }
      .topbar-inner a:hover { color: var(--fg); }
      .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 20px; }
      .status { display: flex; align-items: center; gap: 7px; color: var(--green); }
      .status::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }

      /* Main nav */
      .nav {
        border-bottom: 1px solid var(--line);
        background: rgba(11, 18, 32, 0.8);
        backdrop-filter: blur(14px);
        position: sticky; top: 0; z-index: 40;
      }
      .nav-inner { display: flex; align-items: center; gap: 36px; height: 64px; }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
      .brand .mark {
        width: 28px; height: 28px; border-radius: 6px;
        background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
        position: relative;
      }
      .brand .mark::after {
        content: ""; position: absolute; inset: 7px;
        border: 2px solid white; border-radius: 2px;
      }
      .nav-links { display: flex; gap: 26px; font-size: 14px; color: var(--fg-2); font-weight: 500; }
      .nav-links a:hover { color: var(--fg); }
      .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

      .btn {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 10px 18px; border-radius: 6px;
        font-size: 14px; font-weight: 500; transition: 0.15s;
        border: 1px solid transparent;
      }
      .btn-primary { background: var(--accent); color: #0a1224; font-weight: 600; }
      .btn-primary:hover { background: #6ecffc; }
      .btn-outline { border-color: var(--line-2); color: var(--fg); }
      .btn-outline:hover { border-color: var(--fg-2); background: rgba(148, 163, 184, 0.06); }
      .btn-ghost { color: var(--fg-2); }
      .btn-ghost:hover { color: var(--fg); }

      /* Hero */
      .hero { padding: 80px 0 56px; }
      .hero-grid {
        display: grid; grid-template-columns: 1.2fr 1fr; gap: 64px; align-items: center;
      }
      @media (max-width: 1000px) { .hero-grid { grid-template-columns: 1fr; } }
      .eyebrow {
        display: inline-flex; align-items: center; gap: 10px;
        padding: 6px 12px 6px 6px;
        background: rgba(56, 189, 248, 0.08);
        border: 1px solid rgba(56, 189, 248, 0.2);
        border-radius: 100px; font-size: 12px;
      }
      .eyebrow .chip {
        padding: 2px 8px; background: var(--accent); color: #0a1224;
        border-radius: 100px; font-weight: 700;
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px; letter-spacing: 0.06em;
      }
      .headline {
        margin: 24px 0 18px; font-size: clamp(40px, 5.4vw, 68px);
        font-weight: 700; letter-spacing: -0.035em; line-height: 1.02;
      }
      .headline .em {
        background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .sub {
        color: var(--fg-2); font-size: 19px; max-width: 580px; line-height: 1.5;
      }
      .cta-row { display: flex; gap: 12px; margin-top: 32px; align-items: center; flex-wrap: wrap; }
      .cta-meta { color: var(--fg-3); font-size: 13px; }

      /* Arch panel */
      .arch-card {
        background: var(--surface);
        border: 1px solid var(--line-2);
        border-radius: 14px; padding: 24px;
        box-shadow: 0 24px 60px -16px rgba(0, 0, 0, 0.5);
      }
      .arch-title {
        font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
        color: var(--fg-3); margin-bottom: 16px;
      }
      .arch-svg { width: 100%; }
      .arch-legend {
        display: flex; gap: 18px; flex-wrap: wrap; margin-top: 14px;
        font-size: 12px; color: var(--fg-2);
      }
      .arch-legend span { display: flex; align-items: center; gap: 6px; }
      .arch-legend span::before { content: ""; width: 10px; height: 10px; border-radius: 2px; }
      .leg-1::before { background: var(--accent); }
      .leg-2::before { background: var(--gold); }
      .leg-3::before { background: var(--green); }

      /* Trust logos */
      .trust {
        padding: 56px 0 32px;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }
      .trust-head {
        display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 12px;
      }
      .trust-label {
        font-family: "IBM Plex Mono", monospace; font-size: 11px;
        letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3);
      }
      .trust-meta { font-size: 13px; color: var(--fg-2); }
      .trust-meta strong { color: var(--fg); }
      .logos {
        display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px;
      }
      @media (max-width: 820px) { .logos { grid-template-columns: repeat(3, 1fr); } }
      .logo-box {
        padding: 18px; text-align: center; border: 1px solid var(--line);
        border-radius: 8px; font-weight: 600; letter-spacing: -0.01em;
        color: var(--fg-2); background: rgba(255, 255, 255, 0.015);
      }

      /* Core section */
      .core { padding: 96px 0; }
      .sec-head { max-width: 720px; margin-bottom: 56px; }
      .sec-eyebrow {
        color: var(--accent); font-family: "IBM Plex Mono", monospace;
        font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px;
      }
      .sec-title { font-size: 40px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 14px; }
      .sec-sub { color: var(--fg-2); font-size: 17px; }

      .pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
      @media (max-width: 820px) { .pillars { grid-template-columns: 1fr; } }
      .pillar {
        background: var(--surface); border: 1px solid var(--line);
        border-radius: 14px; padding: 28px; position: relative; overflow: hidden;
      }
      .pillar::before {
        content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        opacity: 0.4;
      }
      .pillar-icon {
        width: 44px; height: 44px; border-radius: 10px;
        background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2);
        color: var(--accent); display: flex; align-items: center; justify-content: center;
        font-size: 20px; margin-bottom: 20px;
      }
      .pillar h3 { font-size: 19px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 10px; }
      .pillar p { color: var(--fg-2); font-size: 14.5px; line-height: 1.6; margin-bottom: 20px; }
      .pillar-list { display: flex; flex-direction: column; gap: 8px; }
      .pillar-list li {
        list-style: none; font-size: 13px; color: var(--fg-2);
        display: flex; gap: 10px; align-items: flex-start;
      }
      .pillar-list li::before {
        content: "✓"; color: var(--green); font-weight: 700; flex-shrink: 0;
      }

      /* Compliance band */
      .compliance {
        background: var(--surface);
        border: 1px solid var(--line-2);
        border-radius: 16px; padding: 40px;
      }
      .comp-grid {
        display: grid; grid-template-columns: 1.2fr 2fr; gap: 48px; align-items: center;
      }
      @media (max-width: 820px) { .comp-grid { grid-template-columns: 1fr; } }
      .comp-head h3 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 10px; }
      .comp-head p { color: var(--fg-2); font-size: 15px; }
      .comp-badges {
        display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px;
      }
      @media (max-width: 820px) { .comp-badges { grid-template-columns: repeat(3, 1fr); } }
      .badge-card {
        padding: 18px 10px; text-align: center; border-radius: 10px;
        background: rgba(11, 18, 32, 0.5); border: 1px solid var(--line);
      }
      .badge-card .circ {
        width: 38px; height: 38px; border-radius: 50%; margin: 0 auto 10px;
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(99, 102, 241, 0.2));
        border: 1px solid rgba(56, 189, 248, 0.3);
        display: flex; align-items: center; justify-content: center;
        color: var(--accent); font-weight: 700;
      }
      .badge-card .name { font-size: 12px; font-weight: 600; }
      .badge-card .desc { font-size: 10px; color: var(--fg-3); margin-top: 2px; letter-spacing: 0.02em; }

      /* Quote wall */
      .quotes { padding: 96px 0 64px; }
      .qwall { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
      @media (max-width: 820px) { .qwall { grid-template-columns: 1fr; } }
      .qcard {
        background: var(--surface); border: 1px solid var(--line);
        border-radius: 12px; padding: 24px;
      }
      .qcard .mark { color: var(--accent); font-size: 32px; line-height: 0.2; font-weight: 800; }
      .qcard .q { color: var(--fg); font-size: 15px; line-height: 1.55; margin: 8px 0 20px; }
      .qcard .who { display: flex; gap: 12px; align-items: center; }
      .qcard .avatar {
        width: 36px; height: 36px; border-radius: 50%; background: var(--line-2);
        color: var(--fg); font-weight: 700; font-size: 13px;
        display: flex; align-items: center; justify-content: center;
      }
      .qcard .who-name { font-weight: 600; font-size: 14px; }
      .qcard .who-role { color: var(--fg-3); font-size: 12px; }
      .qcard .stat {
        margin-top: 18px; padding: 12px; background: rgba(56, 189, 248, 0.06);
        border-left: 3px solid var(--accent); border-radius: 4px;
        font-size: 12px; color: var(--fg-2);
      }
      .qcard .stat strong { color: var(--fg); font-size: 20px; letter-spacing: -0.02em; margin-right: 6px; font-weight: 700; }

      /* SLA grid */
      .sla-grid {
        margin-top: 64px; display: grid; grid-template-columns: repeat(4, 1fr);
        gap: 1px; background: var(--line-2);
        border: 1px solid var(--line-2); border-radius: 14px; overflow: hidden;
      }
      @media (max-width: 820px) { .sla-grid { grid-template-columns: repeat(2, 1fr); } }
      .sla-cell { background: var(--bg-2); padding: 28px 24px; }
      .sla-v {
        font-size: 36px; font-weight: 700; letter-spacing: -0.025em;
        background: linear-gradient(180deg, var(--fg) 0%, var(--fg-2) 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .sla-l { color: var(--fg-2); font-size: 13px; margin-top: 6px; }
      .sla-d { color: var(--fg-3); font-size: 12px; margin-top: 2px; }

      /* Big CTA */
      .final-cta {
        margin: 80px 0; padding: 64px 48px;
        border-radius: 18px;
        background:
          radial-gradient(circle at 85% 20%, rgba(56, 189, 248, 0.18), transparent 50%),
          linear-gradient(135deg, var(--surface), var(--bg-2));
        border: 1px solid var(--line-2);
        display: grid; grid-template-columns: 1.4fr 1fr; gap: 48px; align-items: center;
      }
      @media (max-width: 820px) { .final-cta { grid-template-columns: 1fr; padding: 40px 28px; } }
      .final-cta h2 { font-size: 40px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 14px; }
      .final-cta p { color: var(--fg-2); font-size: 17px; }
      .final-form {
        background: rgba(11, 18, 32, 0.5); border: 1px solid var(--line);
        padding: 22px; border-radius: 10px;
      }
      .final-form label { display: block; font-size: 12px; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
      .final-form input {
        width: 100%; padding: 12px 14px; border-radius: 8px;
        background: var(--bg); border: 1px solid var(--line-2);
        color: var(--fg); font-size: 14px;
      }
      .final-form input:focus { outline: none; border-color: var(--accent); }
      .form-help { color: var(--fg-3); font-size: 12px; margin-top: 10px; }

      footer {
        border-top: 1px solid var(--line);
        padding: 40px 0; display: flex; justify-content: space-between;
        flex-wrap: wrap; gap: 16px; color: var(--fg-3); font-size: 13px;
      }

      .locale-picker button { color: var(--fg-3); }
      .locale-picker button.is-active { color: var(--accent); }
    </style>
  </head>

            <text x="140" y="48" text-anchor="middle" fill="#38bdf8" font-family="IBM Plex Mono" font-size="10" font-weight="500">5ms</text>
            <text x="70" y="175" fill="#34d399" font-family="IBM Plex Mono" font-size="8" font-weight="500">MCP</text>
            <text x="70" y="205" fill="#64748b" font-family="IBM Plex Mono" font-size="8">REST</text>
            <text x="290" y="235" text-anchor="middle" fill="#64748b" font-family="IBM Plex Mono" font-size="10">cron · queue · daily · audit</text>
          </svg>

          <div class="arch-legend">
            <span class="leg-1" data-i18n="arch.legend.a"></span>
            <span class="leg-2" data-i18n="arch.legend.b"></span>
            <span class="leg-3" data-i18n="arch.legend.c"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Trust -->
    <section class="trust">
      <div class="container">
        <div class="trust-head">
          <span class="trust-label" data-i18n="trust.label"></span>
          <span class="trust-meta">
            <span data-i18n="trust.meta_a"></span>
            <strong data-i18n="trust.meta_b" data-i18n-vars='{"count":"1,200"}'></strong>
            <span data-i18n="trust.meta_c" data-i18n-vars='{"countries":46}'></span>
          </span>
        </div>
        <div class="logos">
          <div class="logo-box">Ramp</div>
          <div class="logo-box">Datadog</div>
          <div class="logo-box">Plaid</div>
          <div class="logo-box">Census</div>
          <div class="logo-box">Watershed</div>
          <div class="logo-box">Clay</div>
        </div>
      </div>
    </section>

    <!-- Core pillars -->
    <section class="core">
      <div class="container">
        <div class="sec-head">
          <div class="sec-eyebrow mono" data-i18n="core.eyebrow"></div>
          <h2 class="sec-title" data-i18n="core.title"></h2>
          <p class="sec-sub" data-i18n="core.sub"></p>
        </div>

        <div class="pillars">
          <div class="pillar">
            <div class="pillar-icon">◆</div>
            <h3 data-i18n="core.pillars.p1.title"></h3>
            <p data-i18n="core.pillars.p1.body"></p>
            <ul class="pillar-list">
              <li data-i18n="core.pillars.p1.items.0"></li>
              <li data-i18n="core.pillars.p1.items.1"></li>
              <li data-i18n="core.pillars.p1.items.2"></li>
              <li data-i18n="core.pillars.p1.items.3"></li>
            </ul>
          </div>
          <div class="pillar">
            <div class="pillar-icon">∑</div>
            <h3 data-i18n="core.pillars.p2.title"></h3>
            <p data-i18n="core.pillars.p2.body"></p>
            <ul class="pillar-list">
              <li data-i18n="core.pillars.p2.items.0"></li>
              <li data-i18n="core.pillars.p2.items.1"></li>
              <li data-i18n="core.pillars.p2.items.2"></li>
              <li data-i18n="core.pillars.p2.items.3"></li>
            </ul>
          </div>
          <div class="pillar">
            <div class="pillar-icon">文</div>
            <h3 data-i18n="core.pillars.p3.title"></h3>
            <p data-i18n="core.pillars.p3.body"></p>
            <ul class="pillar-list">
              <li data-i18n="core.pillars.p3.items.0"></li>
              <li data-i18n="core.pillars.p3.items.1"></li>
              <li data-i18n="core.pillars.p3.items.2"></li>
              <li data-i18n="core.pillars.p3.items.3"></li>
            </ul>
          </div>
        </div>

        <!-- SLA grid -->
        <div class="sla-grid">
          <div class="sla-cell">
            <div class="sla-v" data-i18n="sla.s1.v"></div>
            <div class="sla-l" data-i18n="sla.s1.l"></div>
            <div class="sla-d" data-i18n="sla.s1.d"></div>
          </div>
          <div class="sla-cell">
            <div class="sla-v" data-i18n="sla.s2.v"></div>
            <div class="sla-l" data-i18n="sla.s2.l"></div>
            <div class="sla-d" data-i18n="sla.s2.d"></div>
          </div>
          <div class="sla-cell">
            <div class="sla-v" data-i18n="sla.s3.v"></div>
            <div class="sla-l" data-i18n="sla.s3.l"></div>
            <div class="sla-d" data-i18n="sla.s3.d"></div>
          </div>
          <div class="sla-cell">
            <div class="sla-v" data-i18n="sla.s4.v"></div>
            <div class="sla-l" data-i18n="sla.s4.l"></div>
            <div class="sla-d" data-i18n="sla.s4.d"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Compliance -->
    <section class="container">
      <div class="compliance">
        <div class="comp-grid">
          <div class="comp-head">
            <h3 data-i18n="comp.head"></h3>
            <p data-i18n="comp.body"></p>
          </div>
          <div class="comp-badges">
            <div class="badge-card">
              <div class="circ">✓</div>
              <div class="name" data-i18n="comp.badges.b1.n"></div>
              <div class="desc" data-i18n="comp.badges.b1.d"></div>
            </div>
            <div class="badge-card">
              <div class="circ">✓</div>
              <div class="name" data-i18n="comp.badges.b2.n"></div>
              <div class="desc" data-i18n="comp.badges.b2.d"></div>
            </div>
            <div class="badge-card">
              <div class="circ">✓</div>
              <div class="name" data-i18n="comp.badges.b3.n"></div>
              <div class="desc" data-i18n="comp.badges.b3.d"></div>
            </div>
            <div class="badge-card">
              <div class="circ">✓</div>
              <div class="name" data-i18n="comp.badges.b4.n"></div>
              <div class="desc" data-i18n="comp.badges.b4.d"></div>
            </div>
            <div class="badge-card">
              <div class="circ">✓</div>
              <div class="name" data-i18n="comp.badges.b5.n"></div>
              <div class="desc" data-i18n="comp.badges.b5.d"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Quotes -->
    <section class="quotes">
      <div class="container">
        <div class="sec-head">
          <div class="sec-eyebrow mono" data-i18n="quotes.eyebrow"></div>
          <h2 class="sec-title" data-i18n="quotes.title"></h2>
        </div>
        <div class="qwall">
          <div class="qcard">
            <div class="mark">"</div>
            <p class="q" data-i18n="quotes.q1.q"></p>
            <div class="who">
              <span class="avatar">EK</span>
              <div>
                <div class="who-name" data-i18n="quotes.q1.name"></div>
                <div class="who-role" data-i18n="quotes.q1.role"></div>
              </div>
            </div>
            <div class="stat">
              <strong data-i18n="quotes.q1.stat_v"></strong>
              <span data-i18n="quotes.q1.stat_d"></span>
            </div>
          </div>
          <div class="qcard">
            <div class="mark">"</div>
            <p class="q" data-i18n="quotes.q2.q"></p>
            <div class="who">
              <span class="avatar">MH</span>
              <div>
                <div class="who-name" data-i18n="quotes.q2.name"></div>
                <div class="who-role" data-i18n="quotes.q2.role"></div>
              </div>
            </div>
            <div class="stat">
              <strong data-i18n="quotes.q2.stat_v"></strong>
              <span data-i18n="quotes.q2.stat_d"></span>
            </div>
          </div>
          <div class="qcard">
            <div class="mark">"</div>
            <p class="q" data-i18n="quotes.q3.q"></p>
            <div class="who">
              <span class="avatar">PN</span>
              <div>
                <div class="who-name" data-i18n="quotes.q3.name"></div>
                <div class="who-role" data-i18n="quotes.q3.role"></div>
              </div>
            </div>
            <div class="stat">
              <strong data-i18n="quotes.q3.stat_v"></strong>
              <span data-i18n="quotes.q3.stat_d"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Final CTA -->
    <section class="container">
      <div class="final-cta">
        <div>
          <h2 data-i18n="final.title"></h2>
          <p data-i18n="final.sub"></p>
        </div>
        <form
          class="final-form"
          onsubmit="event.preventDefault(); this.querySelector('button').textContent='✓ Received';"
        >
          <label data-i18n="final.label"></label>
          <input
            type="email"
            data-i18n-attr="placeholder:final.placeholder"
            required
          />
          <button
            type="submit"
            class="btn btn-primary"
            style="margin-top: 12px; width: 100%; justify-content: center"
            data-i18n="final.button"
          ></button>
          <div class="form-help" data-i18n="final.help"></div>
        </form>
      </div>
    </section>

    <footer class="container">
      <span data-i18n="foot.rights"></span>
      <span data-i18n="foot.links"></span>
    </footer>

    <script src="_shared/i18n.js"></script>
  </body>
</html>
