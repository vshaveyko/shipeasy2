name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-docs:
    name: Deploy docs (shipeasy-docs → docs.shipeasy.ai)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shipeasy/docs exec fumadocs-mdx
      - run: pnpm --filter @shipeasy/docs exec next build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
          workingDirectory: apps/docs

  migrate-db:
    name: Apply D1 migrations (shipeasy-db)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # D1 migrations are NOT auto-run by wrangler deploy — they have to be
      # applied explicitly before the new worker/UI code (which expects the
      # new schema) goes live. Idempotent: already-applied migrations are no-ops.
      - name: Apply migrations
        working-directory: packages/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
        run: pnpm exec wrangler d1 migrations apply shipeasy-db --remote

  deploy-worker:
    name: Deploy edge worker (shipeasy-worker → cdn.shipeasy.ai)
    runs-on: ubuntu-latest
    needs: migrate-db
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
          workingDirectory: packages/worker

  smoke-worker:
    name: Smoke test edge worker
    needs: deploy-worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shipeasy/ui exec playwright install chromium --with-deps
      - name: Run worker smoke tests
        run: pnpm --filter @shipeasy/ui test:smoke
        env:
          SMOKE_WORKER_URL: https://cdn.shipeasy.ai
          SMOKE_SERVER_KEY: ${{ secrets.SMOKE_SERVER_KEY }}
          SMOKE_CLIENT_KEY: ${{ secrets.SMOKE_CLIENT_KEY }}

  deploy-ui:
    name: Deploy admin UI (shipeasy → shipeasy.ai)
    runs-on: ubuntu-latest
    # Worker must be live before the UI deploys (shared KV namespace).
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shipeasy/ui run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
