name: Publish Ruby gems

on:
  push:
    branches: [main]
    paths:
      - "packages/server-sdks/sdk-ruby/**"
  workflow_dispatch:

jobs:
  publish-sdk-ruby:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/server-sdks/sdk-ruby
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Configure RubyGems credentials
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}

      - name: Build and publish shipeasy-sdk
        run: |
          VERSION=$(ruby -e "require_relative 'lib/shipeasy/sdk/version'; puts Shipeasy::SDK::VERSION")
          if gem list shipeasy-sdk --remote --exact --version "$VERSION" | grep -q shipeasy-sdk; then
            echo "Already published: shipeasy-sdk $VERSION"
          else
            gem build shipeasy-sdk.gemspec
            gem push "shipeasy-sdk-${VERSION}.gem"
            echo "Published shipeasy-sdk $VERSION"
          fi
