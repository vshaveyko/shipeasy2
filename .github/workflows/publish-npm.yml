name: Publish npm packages

on:
  push:
    branches: [main]
    paths:
      - "packages/sdk/**"
      - "packages/sdk-vue/**"
      - "packages/sdk-svelte/**"
      - "packages/sdk-angular/**"
      - "packages/i18n-core/**"
      - "packages/i18n-react/**"
      - "packages/i18n-vue/**"
      - "packages/i18n-svelte/**"
      - "packages/i18n-angular/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Publish changed packages
        run: |
          for pkg in \
            packages/sdk \
            packages/sdk-vue \
            packages/sdk-svelte \
            packages/sdk-angular \
            packages/i18n-core \
            packages/i18n-react \
            packages/i18n-vue \
            packages/i18n-svelte \
            packages/i18n-angular; do
            if [ ! -f "$pkg/package.json" ]; then
              echo "Skipping $pkg: no package.json"
              continue
            fi
            PKG_NAME=$(node -p "require('./$pkg/package.json').name")
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null | grep -q "$PKG_VERSION"; then
              echo "Already published: $PKG_NAME@$PKG_VERSION"
            else
              echo "Publishing $PKG_NAME@$PKG_VERSION ..."
              (cd "$pkg" && npm publish --access public)
              echo "Published $PKG_NAME@$PKG_VERSION"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
