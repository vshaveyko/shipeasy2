name: Publish npm packages

on:
  push:
    branches: [main]
    paths:
      - "packages/ts-sdk/**"
      - "packages/client-sdks/sdk-vue/**"
      - "packages/client-sdks/sdk-svelte/**"
      - "packages/client-sdks/sdk-angular/**"
      - "packages/client-sdks/react/**"
      - "packages/client-sdks/i18n-core/**"
      - "packages/client-sdks/i18n-vue/**"
      - "packages/client-sdks/i18n-svelte/**"
      - "packages/client-sdks/i18n-angular/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Trusted Publishing: id-token lets npm exchange the GitHub OIDC token
    # for short-lived publish credentials. No NPM_TOKEN needed once the
    # package is enrolled in npmjs.com → "Trusted Publisher".
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # npm 11.5.1+ is required for Trusted Publishing OIDC auto-detection.
      # Node 22 ships with 10.x; bump to latest before any publish step.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Build only the publishable packages — the rest of the monorepo
      # (docs, ui, worker) is built and deployed by Cloudflare Workers Builds
      # and is not on the publish critical path.
      - run: pnpm --filter "./packages/ts-sdk" --filter "./packages/client-sdks/**" build

      - name: Publish changed packages
        run: |
          for pkg in \
            packages/ts-sdk \
            packages/client-sdks/sdk-vue \
            packages/client-sdks/sdk-svelte \
            packages/client-sdks/sdk-angular \
            packages/client-sdks/react \
            packages/client-sdks/i18n-core \
            packages/client-sdks/i18n-vue \
            packages/client-sdks/i18n-svelte \
            packages/client-sdks/i18n-angular; do
            if [ ! -f "$pkg/package.json" ]; then
              echo "Skipping $pkg: no package.json"
              continue
            fi
            PKG_NAME=$(node -p "require('./$pkg/package.json').name")
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null | grep -q "$PKG_VERSION"; then
              echo "Already published: $PKG_NAME@$PKG_VERSION"
            else
              echo "Publishing $PKG_NAME@$PKG_VERSION ..."
              # --provenance attaches the SLSA-style attestation that npm
              # surfaces under "Provenance" — only available when authed via
              # OIDC, which is exactly what Trusted Publishing gives us.
              (cd "$pkg" && npm publish --access public --provenance)
              echo "Published $PKG_NAME@$PKG_VERSION"
            fi
          done
