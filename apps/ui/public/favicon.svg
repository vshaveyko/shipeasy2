<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0a0a0b; }
    .line { fill: none; stroke: rgba(255,255,255,0.14); stroke-width: 1; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fafafa; }
      .line { stroke: rgba(0,0,0,0.14); }
    }
  </style>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5dd39e"/>
      <stop offset="45%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#5dd39e"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="32" height="32" rx="8.6" ry="8.6" fill="url(#ring)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="8.3" ry="8.3" class="line"/>
  <rect x="7" y="7" width="18" height="18" rx="2.5" ry="2.5" class="bg"/>
  <rect x="7.5" y="7.5" width="17" height="17" rx="2.2" ry="2.2" class="line"/>
</svg>
