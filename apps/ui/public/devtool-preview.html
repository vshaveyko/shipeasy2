    /* Build a tree of label key segments: 'home.hero.title' →
       { home: { hero: { __leaves__: [row(title)] } } } */
    function buildLabelTree(rows) {
      const root = { name:'', children:{}, leaves:[], path:'' };
      for (const r of rows) {
        const parts = r.k.split('.');
        let node = root;
        for (let i = 0; i < parts.length - 1; i++) {
          const seg = parts[i];
          if (!node.children[seg]) {
            node.children[seg] = { name: seg, children:{}, leaves:[],
              path: node.path ? node.path + '.' + seg : seg };
          }
          node = node.children[seg];
        }
        node.leaves.push(r);
      }
      return root;
    }
    function countLeaves(node) {
      let n = node.leaves.length;
      for (const c of Object.values(node.children)) n += countLeaves(c);
      return n;
    }
    function countMissing(node, locale) {
      let n = 0;
      for (const r of node.leaves) if (r.val[locale] == null) n++;
      for (const c of Object.values(node.children)) n += countMissing(c, locale);
      return n;
    }

    function LabelsTab({ rows, locale, setLocale, view, expanded, setExpanded, onEdit }) {
      const loc = LOCALES.find(l => l.code === locale) || LOCALES[1];
      const visible = view === 'page' ? rows.filter(r => r.activeOnPage) : rows;
      const translated = rows.filter(r => r.val[locale] != null).length;
      const total = rows.length;
      const tree = React.useMemo(() => buildLabelTree(visible), [visible]);
      // single open-map shared across the tree; default = open
      const [openMap, setOpenMap] = React.useState({});
      const isOpenSeg = (path) => openMap[path] !== false;
      const toggleSeg = (path) => setOpenMap(m => ({ ...m, [path]: !(m[path] !== false) }));

      const Row = ({ r, depth = 0 }) => {
        const v = r.val[locale];
        const missing = v == null;
        const isOpen = expanded === r.k;
        const last = r.k.split('.').pop();
        const Pill = () => {
          if (missing) return <span className="lbl-pill missing" title="Missing translation">⊘</span>;
          if (r.status === 'review' || r.flagged) return <span className="lbl-pill review" title="Needs review">!</span>;
          if (r.status === 'partial') return <span className="lbl-pill partial" title="Partial coverage">◐</span>;
          if (r.edited) return <span className="lbl-pill edited" title="Edited">✎</span>;
          return <span className="lbl-pill ok" title="Translated">●</span>;
        };
        return (<>
          <div className={'dtf-lbl-row' + (isOpen ? ' expanded' : '') + (missing ? ' missing' : '')}
               style={{ paddingLeft: 12 + depth * 14 }}
               onClick={() => setExpanded(r.k)}
               title={r.k}>
            <Pill/>
            <div className="meta">
              <div className="src">
                {last}
                {missing ? null : <CopyBtn value={v} title={`Copy ${loc.code} value`}/>}
              </div>
              <div className="sub">
                <span className="k" title={missing ? `Missing in ${loc.code}` : v}>{missing ? <em style={{color:'var(--warn)'}}>— not translated —</em> : v}</span>
                <span className="dot">·</span><span>{r.page}</span>
                {r.vars ? <><span className="dot">·</span><span className="var">{r.vars.map(x => `{{${x}}}`).join(' ')}</span></> : null}
              </div>
            </div>
            {r.activeOnPage ? <span className="live-dot" title="visible on this page" style={{width:5,height:5,borderRadius:'50%',background:'var(--accent)',boxShadow:'0 0 5px var(--accent)'}}/> : <span style={{width:5}}/>}
          </div>
          <div className={'dtf-detail' + (isOpen ? ' open' : '')}>
            <div className="inner"><div className="pad lbl-pad">
              <div className="lbl-locales">
                {LOCALES.map(l => {
                  const tv = r.val[l.code];
                  return (
                    <div key={l.code} className={'lbl-locale' + (l.code === locale ? ' sel' : '') + (tv == null ? ' miss' : '')}
                         onClick={(e) => { e.stopPropagation(); setLocale(l.code); }}>
                      <span className="fl">{l.flag}</span>
                      <span className="nm">{l.name}{l.base ? <span className="base"> · base</span> : null}</span>
                      <span className="tv" title={tv == null ? `Missing translation for ${l.code}` : tv}>{tv == null ? '—' : tv}</span>
                    </div>
                  );
                })}
              </div>
              <div className="lbl-edit">
                <div className="hd">
                  <span>{loc.flag} {loc.name}</span>
                  <button onClick={(e) => e.stopPropagation()}>↻ Auto-translate</button>
                </div>
                <textarea value={r.val[locale] || ''} placeholder={`Translate "${r.src}" to ${loc.name}…`}
                  onClick={(e) => e.stopPropagation()} onChange={(e) => onEdit(r.k, e.target.value)}/>
                {r.vars ? (<div className="lbl-vars">vars:
                  {r.vars.map(v => <span key={v} className="var">{`{{${v}}}`}</span>)}
                </div>) : null}
                {r.note ? <div className="lbl-note">⚠ {r.note}</div> : null}
              </div>
              <div className="actions">
                <button className="primary" onClick={(e) => e.stopPropagation()}>⤢ Save translation</button>
                <button>↗ Open in Polylang</button>
              </div>
            </div></div>
          </div>
        </>);
      };

      const TreeBranch = ({ node, depth }) => {
        const segs = Object.keys(node.children);
        return (<>
          {segs.map(seg => {
            const child = node.children[seg];
            const open = isOpenSeg(child.path);
            const total = countLeaves(child);
            const missing = countMissing(child, locale);
            return (
              <React.Fragment key={child.path}>
                <div className="dtf-tree-node"
                  style={{ paddingLeft: 12 + depth * 14 }}
                  onClick={() => toggleSeg(child.path)}>
                  <span className="caret">{open ? '▾' : '▸'}</span>
                  <span className="seg">{child.name}</span>
                  <span className="dotpath">{child.path}</span>
                  <span className="counts">
                    {missing > 0 ? <span className="m">{missing} missing</span> : null}
                    <span className="t">{total}</span>
                  </span>
                </div>
                {open ? (<>
                  <TreeBranch node={child} depth={depth + 1}/>
                  {child.leaves.map(r => <Row key={r.k} r={r} depth={depth + 1}/>)}
                </>) : null}
              </React.Fragment>
            );
          })}
          {/* root-level leaves (keys with no segments) get rendered at depth 0 */}
          {depth === 0 && node.leaves.map(r => <Row key={r.k} r={r} depth={0}/>)}
        </>);
      };

      return (<>
        <div className="dtf-group">
          {view === 'page' ? 'Visible on this page' : 'All keys in project'}
          <span className="cov-mini" title={`${loc.name} coverage`}>{translated}/{total}</span>
          <span className="pulse"><span className="d"/>{visible.length} {view === 'page' ? 'rendered' : 'total'}</span>
        </div>
        <TreeBranch node={tree} depth={0}/>
      </>);
    }

    /* ===== Feedback (bugs / feature requests) ===== */
    function timeAgo(iso) {
      const d = Date.now() - Date.parse(iso);
      const m = Math.floor(d / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    }
    const BUG_STATUS_CLS = { open:'badge-run', resolved:'badge-on', wont_fix:'badge-off', draft:'badge-draft' };
    const FR_STATUS_CLS  = { open:'badge-run', shipped:'badge-on', declined:'badge-off', under_review:'badge-draft' };
    const FR_IMP_CLS     = { critical:'badge-warn', important:'badge-run', nice_to_have:'badge-draft' };
    const Badge = ({ cls, label }) =>
      <span className={'badge ' + cls}>{label.replace(/_/g,' ')}</span>;

    function FeedbackDetail({ item, kind }) {
      if (kind === 'bug') {
        return (
          <div className="se-feedback-detail open">
            <div className="inner"><div className="pad">
              {item.steps ? (
                <div className="se-fb-section">
                  <span className="lbl">Steps to reproduce</span>
                  <div className="se-fb-block">{item.steps}</div>
                </div>
              ) : null}
              {item.actual ? (
                <div className="se-fb-section">
                  <span className="lbl">Actual</span>
                  <div className="se-fb-block">{item.actual}</div>
                </div>
              ) : null}
              {item.expected ? (
                <div className="se-fb-section">
                  <span className="lbl">Expected</span>
                  <div className="se-fb-block">{item.expected}</div>
                </div>
              ) : null}
              {item.attachments && item.attachments.length > 0 ? (
                <div className="se-fb-section">
                  <span className="lbl">Attachments</span>
                  <div className="se-attach-grid">
                    {item.attachments.map((a, i) => (
                      <AttachmentCard key={i} readOnly
                        item={{ ...a, blob: { size: a.size }, duration: a.duration }}/>
                    ))}
                  </div>
                </div>
              ) : null}
              <div className="se-fb-meta">
                <span className="k">page</span><span>{item.pageUrl}</span>
                <span className="k">viewport</span><span>{item.viewport}</span>
                <span className="k">filed</span><span>{timeAgo(item.createdAt)}{item.reporterEmail ? ' · ' + item.reporterEmail : ''}</span>
              </div>
              <div className="se-fb-actions">
                <a className="ibtn pri" target="_blank" rel="noopener" href="#"
                   onClick={(e) => e.stopPropagation()}>
                  <IconExternalLink size={10}/> Open in dashboard
                </a>
                <CopyBtn value={item.title} title="Copy title"/>
              </div>
            </div></div>
          </div>
        );
      }
      return (
        <div className="se-feedback-detail open">
          <div className="inner"><div className="pad">
            {item.description ? (
              <div className="se-fb-section">
                <span className="lbl">Description</span>
                <div className="se-fb-block">{item.description}</div>
              </div>
            ) : null}
            {item.useCase ? (
              <div className="se-fb-section">
                <span className="lbl">Use case</span>
                <div className="se-fb-block">{item.useCase}</div>
              </div>
            ) : null}
            <div className="se-fb-meta">
              <span className="k">importance</span><span>{item.importance.replace('_', ' ')}</span>
              <span className="k">filed</span><span>{timeAgo(item.createdAt)}{item.reporterEmail ? ' · ' + item.reporterEmail : ''}</span>
            </div>
            <div className="se-fb-actions">
              <a className="ibtn pri" target="_blank" rel="noopener" href="#"
                 onClick={(e) => e.stopPropagation()}>
                <IconExternalLink size={10}/> Open in dashboard
              </a>
              <a className="ibtn" target="_blank" rel="noopener" href="#"
                 onClick={(e) => e.stopPropagation()}>↑ Upvote</a>
              <CopyBtn value={item.title} title="Copy title"/>
            </div>
          </div></div>
        </div>
      );
    }

    /* Quick-action menu rendered as child of the feedback rail icon, shown on hover */
    function FeedbackHoverMenu({ onBug, onFeature, onOpen }) {
      const fire = (e, fn) => { e.preventDefault(); e.stopPropagation(); fn(); };
      return (
        <div className="dtf-hover-menu" role="menu" aria-label="Feedback quick actions">
          <div className="hd">Feedback</div>
          <button role="menuitem" onClick={(e) => fire(e, onBug)}>
            <span className="ic"><IconBug size={12}/></span>
            File a bug
          </button>
          <button role="menuitem" onClick={(e) => fire(e, onFeature)}>
            <span className="ic" style={{color:'var(--pri)'}}><IconSparkles size={12}/></span>
            Request a feature
          </button>
          <div style={{height:1,background:'var(--line-2)',margin:'4px 0'}}/>
          <button role="menuitem" onClick={(e) => fire(e, onOpen)} style={{color:'var(--fg-3)'}}>
            <span className="ic" style={{color:'var(--fg-3)'}}><IconExternalLink size={11}/></span>
            Open feedback list
          </button>
        </div>
      );
    }

    function FeedbackList({ items, kind, dashLabel, ctaLabel, onFile }) {
      const [openId, setOpenId] = React.useState(null);
      return (
        <>
          <div className="se-feedback-head">
            <button className="ibtn pri" onClick={onFile}>+ {ctaLabel}</button>
            <span className="grow"/>
            <a className="ibtn" target="_blank" rel="noopener" href="#">
              <IconExternalLink size={10}/> {dashLabel}
            </a>
          </div>
          <div className="se-feedback-list">
            {items.length === 0 ? (
              <div className="se-empty">
                {kind === 'bug'
                  ? 'No bugs filed yet. Spotted one? Hit "File a bug".'
                  : 'No feature requests yet.'}
              </div>
            ) : items.map(b => {
              const open = openId === b.id;
              return (
                <React.Fragment key={b.id}>
                  <div className={'se-feedback-row' + (open ? ' expanded' : '')}
                       onClick={() => setOpenId(open ? null : b.id)}>
                    <span className="chev">▸</span>
                    <div className="grow">
                      <div className="row-name">{b.title}</div>
                      <div className="row-sub">
                        {timeAgo(b.createdAt)}
                        {b.reporterEmail ? ' · ' + b.reporterEmail : ''}
                      </div>
                    </div>
                    {kind === 'feature'
                      ? <Badge cls={FR_IMP_CLS[b.importance]} label={b.importance}/>
                      : null}
                    <Badge cls={(kind === 'bug' ? BUG_STATUS_CLS : FR_STATUS_CLS)[b.status]} label={b.status}/>
                  </div>
                  {open ? <FeedbackDetail item={b} kind={kind}/> : null}
                </React.Fragment>
              );
            })}
          </div>
        </>
      );
    }

    /* Modal scaffold reused across forms.
       `dirty` controls discard-guard: closing while true shows an inline confirm. */
    function FormModal({ title, large, dirty, onClose, children }) {
      const [askDiscard, setAskDiscard] = React.useState(false);
      const tryClose = React.useCallback(() => {
        if (dirty) { setAskDiscard(true); return; }
        onClose();
      }, [dirty, onClose]);
      React.useEffect(() => {
        const onKey = (e) => {
          if (e.key !== 'Escape') return;
          if (askDiscard) { setAskDiscard(false); return; }
          tryClose();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [tryClose, askDiscard]);
      return (
        <div className="dtf-modal-bg" onClick={tryClose}>
          <div className={'dtf-modal' + (large ? ' lg' : '')} onClick={e => e.stopPropagation()}>
            <div className="hd">
              <button className="back" onClick={tryClose} title="Back">
                <IconArrowLeft size={12}/> Back
              </button>
              <span className="k" style={{marginLeft:8}}>{title}</span>
              <span style={{flex:1}}/>
              <button className="x" onClick={tryClose} title="Close (Esc)">
                <IconX size={12}/>
              </button>
            </div>
            {askDiscard ? (
              <div className="dtf-discard">
                <IconAlertTriangle size={11}/>
                <span>Discard your changes?</span>
                <span style={{flex:1}}/>
                <button className="ibtn" onClick={() => setAskDiscard(false)}>Keep editing</button>
                <button className="ibtn danger" onClick={onClose}>Discard</button>
              </div>
            ) : null}
            {children}
          </div>
        </div>
      );
    }

    function fmtBytes(n) {
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(0)} KB`;
      return `${(n / 1024 / 1024).toFixed(1)} MB`;
    }
    function fileExt(name) {
      const i = name.lastIndexOf('.');
      return i > 0 ? name.slice(i + 1) : 'file';
    }
    function fmtDuration(ms) {
      const s = Math.round(ms / 1000);
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    /* Single attachment thumbnail card — renders a kind-aware preview, an
       upload progress veil while `progress < 100`, and a remove ✕ on hover. */
    function AttachmentCard({ item, onRemove, readOnly }) {
      const isUploading = item.progress != null && item.progress < 100;
      const isDone = item.progress === 100;
      const isError = item.error;
      // Progress ring math (radius 11, stroke 2.5)
      const C = 2 * Math.PI * 11;
      const dashOffset = C * (1 - (item.progress || 0) / 100);

      let preview;
      if (item.kind === 'screenshot') {
        preview = <div className="preview screenshot"/>;
      } else if (item.kind === 'recording') {
        preview = (
          <div className="preview recording">
            <div className="play"><IconPlayMini size={13}/></div>
            <span className="dur">{fmtDuration(item.duration || 12_000)}</span>
          </div>
        );
      } else {
        preview = (
          <div className="preview file">
            <IconFile size={22}/>
            <span className="ext">.{fileExt(item.filename)}</span>
          </div>
        );
      }

      return (
        <div className={'se-attach-card'
            + (isUploading ? ' uploading' : '')
            + (isDone ? ' just-done' : '')
            + (isError ? ' error' : '')}>
          {preview}
          {isUploading ? (
            <>
              <div className="upload-veil">
                <svg className="ring" viewBox="0 0 28 28" aria-hidden="true">
                  <circle className="track" cx="14" cy="14" r="11"/>
                  <circle className="bar"   cx="14" cy="14" r="11"
                    strokeDasharray={C} strokeDashoffset={dashOffset}/>
                </svg>
                <span className="pct">{Math.round(item.progress)}%</span>
              </div>
              <div className="progress"><div className="fill" style={{width: `${item.progress}%`}}/></div>
            </>
          ) : null}
          {isError ? (
            <div className="upload-veil">
              <span className="err-msg">Upload failed · click to retry</span>
            </div>
          ) : null}
          {!readOnly ? (
            <button className="rm" onClick={onRemove} title="Remove" aria-label="Remove attachment">
              <IconX size={11}/>
            </button>
          ) : null}
          <div className="meta">
            <span className="ic">
              {item.kind === 'screenshot' ? <IconCamera size={11}/>
                : item.kind === 'recording' ? <IconRecord size={11}/>
                : <IconFile size={11}/>}
            </span>
            <span className="name" title={item.filename}>{item.filename}</span>
            <span className="size">{fmtBytes(item.blob?.size || item.size || 0)}</span>
          </div>
        </div>
      );
    }

    function BugFormModal({ onSubmit, onClose }) {
      const [title, setTitle] = React.useState('');
      const [steps, setSteps] = React.useState('');
      const [actual, setActual] = React.useState('');
      const [expected, setExpected] = React.useState('');
      const [attachments, setAttachments] = React.useState([]);
      const [recording, setRecording] = React.useState(false);
      const [status, setStatus] = React.useState({ msg:'', err:false });
      const fileRef = React.useRef(null);

      /* Simulated upload: each new attachment ticks 0→100 over ~1.4s, then is
         marked "done" (briefly flashes the accent border) and finally settles. */
      const simulateUpload = (id) => {
        const tick = setInterval(() => {
          setAttachments(arr => arr.map(a => {
            if (a.id !== id) return a;
            const next = (a.progress ?? 0) + 8 + Math.random() * 12;
            if (next >= 100) {
              clearInterval(tick);
              setTimeout(() => setAttachments(arr2 => arr2.map(x =>
                x.id === id ? { ...x, justDone: false } : x)), 700);
              return { ...a, progress: 100, justDone: true };
            }
            return { ...a, progress: next };
          }));
        }, 110);
      };

      const addAttachment = (kind, filename, size) => {
        const id = 'at_' + Math.random().toString(36).slice(2, 7);
        const item = { id, kind, filename,
          duration: kind === 'recording' ? 8_000 + Math.floor(Math.random() * 18_000) : null,
          blob: { size }, progress: 0 };
        setAttachments(a => [...a, item]);
        simulateUpload(id);
      };

      const stub = (kind, name) => {
        addAttachment(kind, name,
          kind === 'recording' ? 2_400_000 + Math.floor(Math.random() * 800_000)
          : 140_000 + Math.floor(Math.random() * 120_000));
      };
      const onFile = (e) => {
        const f = e.target.files?.[0]; if (!f) return;
        addAttachment('file', f.name, f.size);
        e.target.value = '';
      };
      const removeAt = (id) => setAttachments(arr => arr.filter(a => a.id !== id));

      const uploading = attachments.some(a => a.progress != null && a.progress < 100);
      const dirty = !!(title || steps || actual || expected || attachments.length);
      const submit = () => {
        if (!title.trim()) { setStatus({ msg:'Title is required', err:true }); return; }
        if (uploading)    { setStatus({ msg:'Wait for uploads to finish…', err:true }); return; }
        setStatus({ msg:'Submitting…', err:false });
        setTimeout(() => {
          onSubmit({
            id:'b_' + Math.random().toString(36).slice(2,6),
            title: title.trim(),
            status:'open',
            reporterEmail:'maya@acme.co',
            createdAt: new Date().toISOString(),
          });
          onClose();
        }, 300);
      };

      return (
        <FormModal title="File a bug" large dirty={dirty} onClose={onClose}>
          <div className="se-form">
            <label className="se-field">
              <span className="se-label">Title</span>
              <input className="se-input" autoFocus value={title}
                onChange={e => setTitle(e.target.value)} placeholder="Short summary of the bug"/>
            </label>
            <label className="se-field">
              <span className="se-label">Steps to reproduce</span>
              <textarea className="se-input se-textarea" rows={4} value={steps}
                onChange={e => setSteps(e.target.value)}
                placeholder={'1. Go to…\n2. Click…'}/>
            </label>
            <div className="se-field-row">
              <label className="se-field">
                <span className="se-label">Actual result</span>
                <textarea className="se-input se-textarea" rows={3} value={actual}
                  onChange={e => setActual(e.target.value)}/>
              </label>
              <label className="se-field">
                <span className="se-label">Expected result</span>
                <textarea className="se-input se-textarea" rows={3} value={expected}
                  onChange={e => setExpected(e.target.value)}/>
              </label>
            </div>
            <div className="se-field">
              <span className="se-label">Attachments</span>
              <div className="se-actions">
                <button type="button" className="ibtn"
                  onClick={() => stub('screenshot', `screenshot-${Date.now()}.png`)}>
                  <IconCamera size={11}/> Screenshot
                </button>
                <button type="button"
                  className={'ibtn' + (recording ? ' recording' : '')}
                  onClick={() => {
                    if (recording) { stub('recording', `recording-${Date.now()}.webm`); setRecording(false); }
                    else { setRecording(true); }
                  }}>
                  <IconRecord size={11}/> {recording ? 'Stop recording' : 'Record screen'}
                </button>
                <button type="button" className="ibtn" onClick={() => fileRef.current?.click()}>
                  <IconUpload size={11}/> Upload file
                </button>
                <input type="file" hidden ref={fileRef} onChange={onFile}/>
              </div>
              {attachments.length > 0 ? (
                <div className="se-attach-grid">
                  {attachments.map(a => (
                    <AttachmentCard key={a.id} item={a} onRemove={() => removeAt(a.id)}/>
                  ))}
                </div>
              ) : null}
              <div className={'se-status' + (status.err ? ' err' : '')}>{status.msg}</div>
            </div>
          </div>
          <div className="ft">
            <span className="sp"/>
            <button className="ibtn" onClick={onClose}>Cancel</button>
            <button className="ibtn pri" onClick={submit}>Submit</button>
          </div>
        </FormModal>
      );
    }

    function FeatureFormModal({ onSubmit, onClose }) {
      const [title, setTitle] = React.useState('');
      const [desc, setDesc] = React.useState('');
      const [useCase, setUseCase] = React.useState('');
      const [importance, setImportance] = React.useState('nice_to_have');
      const [status, setStatus] = React.useState({ msg:'', err:false });
      const dirty = !!(title || desc || useCase || importance !== 'nice_to_have');
      const submit = () => {
        if (!title.trim()) { setStatus({ msg:'Title is required', err:true }); return; }
        setStatus({ msg:'Submitting…', err:false });
        setTimeout(() => {
          onSubmit({
            id:'f_' + Math.random().toString(36).slice(2,6),
            title: title.trim(),
            status:'open',
            importance,
            reporterEmail:'maya@acme.co',
            createdAt: new Date().toISOString(),
          });
          onClose();
        }, 300);
      };
      return (
        <FormModal title="Request a feature" large dirty={dirty} onClose={onClose}>
          <div className="se-form">
            <label className="se-field">
              <span className="se-label">Title</span>
              <input className="se-input" autoFocus value={title}
                onChange={e => setTitle(e.target.value)}
                placeholder="One-line summary of the feature"/>
            </label>
            <label className="se-field">
              <span className="se-label">What would it do?</span>
              <textarea className="se-input se-textarea" rows={4} value={desc}
                onChange={e => setDesc(e.target.value)}
                placeholder="Describe the feature you'd like to see."/>
            </label>
            <label className="se-field">
              <span className="se-label">Use case / why does it matter?</span>
              <textarea className="se-input se-textarea" rows={3} value={useCase}
                onChange={e => setUseCase(e.target.value)}
                placeholder="Who needs this? What does it unlock?"/>
            </label>
            <label className="se-field">
              <span className="se-label">Importance</span>
              <select className="se-input" value={importance}
                onChange={e => setImportance(e.target.value)}>
                <option value="nice_to_have">Nice to have</option>
                <option value="important">Important</option>
                <option value="critical">Critical</option>
              </select>
            </label>
            <div className={'se-status' + (status.err ? ' err' : '')}>{status.msg}</div>
          </div>
          <div className="ft">
            <span className="sp"/>
            <button className="ibtn" onClick={onClose}>Cancel</button>
            <button className="ibtn pri" onClick={submit}>Submit</button>
          </div>
        </FormModal>
      );
    }

    function EmptyQuiet({ onPin }) {
      return (
        <div className="dtf-empty">
          <div className="vis"><div className="ring r2"/><div className="ring"/><div className="core">0</div></div>
          <h3>Nothing fired<br/>on <em>this route.</em></h3>
          <p>No flags evaluated on this page yet. Pin a flag to watch — or navigate to a flagged route.</p>
          <div className="actions">
            <button className="a" onClick={onPin}>
              <span className="ic">+</span><span className="k">Pin a flag to watch</span><span className="kbd">P</span>
            </button>
            <button className="a">
              <span className="ic">↻</span><span className="k">Re-evaluate this page</span><span className="kbd">R</span>
            </button>
          </div>
        </div>
      );
    }

    function EmptySearch({ q, onPick }) {
      return (
        <div className="dtf-empty search">
          <div className="glyph"><span>{'['}</span><span className="core"/><span>{']'}</span></div>
          <h3>No flag matches<br/><em style={{fontFamily:'var(--mono)',fontStyle:'normal',fontSize:14,color:'var(--fg-3)'}}>"{q}"</em></h3>
          <p>Nothing in your project shares that key. Did you mean —</p>
          <div className="suggest">
            <div className="head">DID YOU MEAN</div>
            <div className="row" onClick={() => onPick('checkout_v3')}>
              <span className="ic acc">F</span>
              <span className="k">exp.checkout_v3</span>
              <span className="meta">running</span>
            </div>
            <div className="row" onClick={() => onPick('beta_drop')}>
              <span className="ic warn">F</span>
              <span className="k">gate.beta_drop</span>
              <span className="meta">forced</span>
            </div>
            <div className="row">
              <span className="ic">+</span>
              <span style={{color:'var(--fg-3)',fontFamily:'var(--mono)',fontSize:11}}>Create flag "{q}"</span>
              <span className="meta">⌘⏎</span>
            </div>
          </div>
        </div>
      );
    }

    function LoadingState() {
      return (
        <div className="dtf-load">
          <div className="topstrip"/>
          {[1,2,3,4,5,6].map(i => (
            <div key={i} className={'skel-row' + (i <= 3 ? ' live' : '')}>
              <div className="ic"/>
              <div className="body">
                <div className="skel" style={{height:9, width:`${50 + (i*7)%30}%`}}/>
                <div className="skel" style={{height:7, width:`${36 + (i*11)%24}%`}}/>
              </div>
              <div className="skel" style={{height:10, width:38}}/>
              <div className="togsk"/>
            </div>
          ))}
        </div>
      );
    }

    const RAIL_MIN = 24, RAIL_MAX = 56;

    function App() {
      const [tab, setTab] = React.useState('gates');
      const [view, setView] = React.useState('page');
      const [state, setState] = React.useState('live');
      const [collapsed, setCollapsed] = React.useState(false);
      const [railEdge, setRailEdge] = React.useState('right');
      const [railOffsetPct, setRailOffsetPct] = React.useState(50);
      const [railIconSize, setRailIconSize] = React.useState(32);
      const stageRef = React.useRef(null);

      const draggedRef = React.useRef(false);
      const startRailDrag = (e) => {
        e.preventDefault(); e.stopPropagation();
        const stage = stageRef.current?.getBoundingClientRect();
        if (!stage) return;
        // capture cursor offset from the rail's center so the rail doesn't
        // jump under the cursor when the drag starts off-center (e.g. on the logo)
        const railEl = e.currentTarget.closest('.dtf-panel');
        const railRect = railEl ? railEl.getBoundingClientRect() : null;
        const offX = railRect ? (e.clientX - (railRect.left + railRect.width  / 2)) : 0;
        const offY = railRect ? (e.clientY - (railRect.top  + railRect.height / 2)) : 0;
        const startX = e.clientX, startY = e.clientY;
        draggedRef.current = false;
        const move = (ev) => {
          if (Math.hypot(ev.clientX - startX, ev.clientY - startY) > 4) draggedRef.current = true;
          // virtual rail-center cursor (compensates for grab offset)
          const cx = ev.clientX - offX;
          const cy = ev.clientY - offY;
          const x = cx - stage.left;
          const y = cy - stage.top;
          const dR = stage.width - x, dL = x, dT = y, dB = stage.height - y;
          const min = Math.min(dR, dL, dT, dB);
          const edge = min === dR ? 'right' : min === dL ? 'left' : min === dT ? 'top' : 'bottom';
          const isVert = edge === 'right' || edge === 'left';
          const pct = Math.max(5, Math.min(95, isVert ? (y/stage.height)*100 : (x/stage.width)*100));
          setRailEdge(edge); setRailOffsetPct(pct);
        };
        const up = () => {
          document.removeEventListener('mousemove', move);
          document.removeEventListener('mouseup', up);
        };
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', up);
      };

      const startRailResize = (e) => {
        e.preventDefault(); e.stopPropagation();
        const isVert = railEdge === 'right' || railEdge === 'left';
        const startX = e.clientX, startY = e.clientY, startSize = railIconSize;
        // The grip sits at the rail's outer end: dragging further outward grows
        // the rail; dragging back toward the icons shrinks it. 1:1 with cursor
        // movement so users hit min/max within the rail's own footprint.
        const move = (ev) => {
          const delta = isVert ? (ev.clientY - startY) : (ev.clientX - startX);
          const next = Math.max(RAIL_MIN, Math.min(RAIL_MAX, Math.round(startSize + delta)));
          setRailIconSize(next);
        };
        const up = () => {
          document.removeEventListener('mousemove', move);
          document.removeEventListener('mouseup', up);
        };
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', up);
      };

      const railPosStyle = (() => {
        const isVert = railEdge === 'right' || railEdge === 'left';
        const s = { position:'absolute' };
        if (railEdge === 'right')  { s.right = 0;  s.top = railOffsetPct + '%'; s.transform = 'translateY(-50%)'; }
        if (railEdge === 'left')   { s.left  = 0;  s.top = railOffsetPct + '%'; s.transform = 'translateY(-50%)'; }
        if (railEdge === 'top')    { s.top   = 0;  s.left = railOffsetPct + '%'; s.transform = 'translateX(-50%)'; }
        if (railEdge === 'bottom') { s.bottom= 0;  s.left = railOffsetPct + '%'; s.transform = 'translateX(-50%)'; }
        return s;
      })();
      const [search, setSearch] = React.useState('');
      const [expanded, setExpanded] = React.useState('gate.beta_drop');
      const [gates, setGates] = React.useState(DEFAULT_GATES);
      const [exps, setExps] = React.useState(DEFAULT_EXPS);
      const [configs, setConfigs] = React.useState(DEFAULT_CONFIGS);
      const [overrideTarget, setOverrideTarget] = React.useState(null);
      const [labels, setLabels] = React.useState(DEFAULT_LABELS);
      const [bugs, setBugs] = React.useState(DEFAULT_BUGS);
      const [features, setFeatures] = React.useState(DEFAULT_FEATURES);
      const [bugFormOpen, setBugFormOpen] = React.useState(false);
      const [featureFormOpen, setFeatureFormOpen] = React.useState(false);
      const [feedbackSub, setFeedbackSub] = React.useState('bugs');
      const [labelLocale, setLabelLocale] = React.useState('fr-FR');
      const [user, setUserState] = React.useState(DEFAULT_USER);
      const [dirty, setDirty] = React.useState({});

      const setUser = (k, v) => {
        setUserState(u => ({ ...u, [k]: v }));
        setDirty(d => ({ ...d, [k]: v !== DEFAULT_USER[k] }));
      };
      const onReeval = () => {
        setState('loading');
        setTimeout(() => { setState('live'); setTab('gates'); }, 1300);
      };
      const onToggleGate = (k) => setGates(gs => gs.map(g => g.k === k ? { ...g, val: !g.val } : g));
      const onVariant = (k, v) => setExps(es => es.map(e => e.k === k ? { ...e, variant: v } : e));
      const onOverride = (row, reset) => {
        if (reset) { setConfigs(cs => cs.map(c => c.k === row.k ? { ...c, val: c.real } : c)); return; }
        setOverrideTarget(row);
      };
      const onSaveOverride = (k, v) => {
        setConfigs(cs => cs.map(c => c.k === k ? { ...c, val: v } : c));
        setOverrideTarget(null);
      };

      const tabRows = tab === 'gates' ? gates
        : tab === 'exps' ? exps
        : tab === 'configs' ? configs
        : tab === 'labels' ? labels
        : [];

      const filtered = search ? tabRows.filter(r => r.k.toLowerCase().includes(search.toLowerCase())) : tabRows;

      const overrides =
        gates.filter(g => g.val !== g.real).length +
        exps.filter(e => e.variant !== e.real).length +
        configs.filter(c => c.val !== c.real).length;

      const tabHasOverrides = (k) => {
        if (k === 'gates') return gates.some(g => g.val !== g.real);
        if (k === 'exps') return exps.some(e => e.variant !== e.real);
        if (k === 'configs') return configs.some(c => c.val !== c.real);
        return false;
      };

      let bodyContent;
      if (state === 'loading') {
        bodyContent = <LoadingState/>;
      } else if (state === 'empty-route' && tab !== 'user' && tab !== 'events' && tab !== 'labels' && tab !== 'feedback') {
        bodyContent = <EmptyQuiet onPin={() => setState('live')}/>;
      } else if (search && filtered.length === 0 && tab !== 'user' && tab !== 'events') {
        bodyContent = <EmptySearch q={search} onPick={(s) => setSearch(s)}/>;
      } else if (tab === 'user') {
        bodyContent = <UserTab user={user} setUser={setUser} dirty={dirty} onReeval={onReeval}/>;
      } else if (tab === 'events') {
        bodyContent = <EventsTab/>;
      } else if (tab === 'feedback') {
        bodyContent = (<>
          <div className="se-fb-subtabs">
            <button className={feedbackSub === 'bugs' ? 'active' : ''}
              onClick={() => setFeedbackSub('bugs')}>
              <IconBug size={11}/> Bugs <span className="c">{bugs.length}</span>
            </button>
            <button className={feedbackSub === 'features' ? 'active' : ''}
              onClick={() => setFeedbackSub('features')}>
              <IconSparkles size={11}/> Feature requests <span className="c">{features.length}</span>
            </button>
          </div>
          {feedbackSub === 'bugs' ? (
            <FeedbackList items={bugs} kind="bug" dashLabel="Open dashboard"
              ctaLabel="File a bug" onFile={() => setBugFormOpen(true)}/>
          ) : (
            <FeedbackList items={features} kind="feature" dashLabel="Open dashboard"
              ctaLabel="Request a feature" onFile={() => setFeatureFormOpen(true)}/>
          )}
        </>);
      } else if (tab === 'labels') {
        bodyContent = <LabelsTab rows={filtered} locale={labelLocale} setLocale={setLabelLocale}
          view={view}
          expanded={expanded} setExpanded={(k) => setExpanded(expanded === k ? null : k)}
          onEdit={(k, v) => setLabels(ls => ls.map(l => l.k === k ? { ...l, val:{...l.val, [labelLocale]:v}, edited:true } : l))}/>;
      } else {
        bodyContent = (<GatesTab rows={filtered} view={view} expanded={expanded}
          setExpanded={(k) => setExpanded(expanded === k ? null : k)}
          onToggle={onToggleGate} onVariant={onVariant} onOverride={onOverride}/>);
      }

      return (
        <div className="dtf-doc">
          <div className="dtf-topbar">
            <div className="crumb">
              <span>Shipeasy</span><span className="sep">/</span>
              <span>DevTool</span><span className="sep">/</span>
              <b>Customer-side plugin</b>
            </div>
            <span className="preview-banner">stub preview · <b>devtool-full.html</b></span>
            <div style={{flex:1}}/>
            <h1>Shipeasy <em>in-page</em></h1>
          </div>

          <div className="dtf-stagewrap">
            <div className="dtf-stage" ref={stageRef}>
              <div className="corner"><span className="d"/>linear-shop.com · LIVE</div>
              <FakeSite/>

              {collapsed ? (
                <div className="dtf-panel collapsed" data-edge={railEdge} style={railPosStyle}>
                  <div className="dtf-panel-rail">
                    <div className="mk" title="Drag to reposition · click to expand"
                      style={{width:railIconSize*0.7, height:railIconSize*0.7}}
                      onMouseDown={startRailDrag}
                      onClick={() => { if (!draggedRef.current) setCollapsed(false); }}/>
                    {TABS.map(t => {
                      const Ic = t.icon;
                      const isFb = t.k === 'feedback';
                      return (
                        <button key={t.k} className={'ri' + (isFb ? ' has-menu' : '')}
                          style={{width:railIconSize, height:railIconSize}}
                          onClick={() => { setTab(t.k); setExpanded(null); setCollapsed(false); }}>
                          <Ic size={Math.round(railIconSize * 0.5)}/>
                          {t.count != null ? <span className="c">{t.count}</span> : null}
                          {tabHasOverrides(t.k) ? <span className="dotw"/> : null}
                          <span className="tip">{t.label}</span>
                          {isFb ? (
                            <FeedbackHoverMenu
                              onBug={() => { setBugFormOpen(true); setCollapsed(false); }}
                              onFeature={() => { setFeatureFormOpen(true); setCollapsed(false); }}
                              onOpen={() => { setTab('feedback'); setFeedbackSub('bugs'); setCollapsed(false); }}/>
                          ) : null}
                        </button>
                      );
                    })}
                    <div className="dtf-rail-resize"
                      style={{
                        width: (railEdge === 'right' || railEdge === 'left') ? railIconSize : 12,
                        height:(railEdge === 'right' || railEdge === 'left') ? 12 : railIconSize,
                      }}
                      onMouseDown={startRailResize}
                      title="Drag to resize"/>
                  </div>
                </div>
              ) : (
                <div className="dtf-panel">
                  <div className="dtf-head">
                    <div className="mk"/>
                    <div className="ti">
                      <span className="title">{TABS.find(t => t.k === tab)?.label || 'Shipeasy'}</span>
                      <span className="sub">linear-shop.com · prod · v0.9.3</span>
                    </div>
                    <div className="actions">
                      <button className="ib" onClick={() => setState(state === 'loading' ? 'live' : 'loading')} title="Toggle loading">
                        <IconRefresh size={11}/>
                      </button>
                      <button className="ib" title="Settings"><IconSettings size={11}/></button>
                      <button className="ib" onClick={() => setCollapsed(true)} title="Collapse"><IconX size={11}/></button>
                    </div>
                  </div>

                  <div className="dtf-split">
                    <div className="dtf-rail">
                      {TABS.map(t => {
                        const Ic = t.icon;
                        const isFb = t.k === 'feedback';
                        return (
                          <button key={t.k}
                                  className={'t' + (tab === t.k ? ' active' : '') + (isFb ? ' has-menu' : '')}
                                  onClick={() => { setTab(t.k); setExpanded(null); }}
                                  title={t.label}>
                            <Ic size={14}/>
                            {t.count != null ? <span className="c">{t.count}</span> : null}
                            {tabHasOverrides(t.k) ? <span className="dotw"/> : null}
                            <span className="tip">{t.label}</span>
                            {isFb ? (
                              <FeedbackHoverMenu
                                onBug={() => { setBugFormOpen(true); }}
                                onFeature={() => { setFeatureFormOpen(true); }}
                                onOpen={() => { setTab('feedback'); setFeedbackSub('bugs'); }}/>
                            ) : null}
                          </button>
                        );
                      })}
                    </div>
                    <div className="dtf-pane">
                      {overrides > 0 && state !== 'loading' && (
                        <div className="dtf-overbar">
                          <IconAlertTriangle size={11}/>
                          <span><b>{overrides} session override{overrides > 1 ? 's' : ''}</b> · cleared on refresh</span>
                          <button onClick={() => { setGates(DEFAULT_GATES); setExps(DEFAULT_EXPS); setConfigs(DEFAULT_CONFIGS); }}>Clear all</button>
                        </div>
                      )}

                      {(['gates','exps','configs','labels'].includes(tab) && state !== 'loading') && (
                        <div className="dtf-search">
                          <div className="input">
                            <IconSearch size={11} style={{color:'var(--fg-3)'}}/>
                            <input placeholder={`Filter ${tab}…`} value={search} onChange={e => setSearch(e.target.value)}/>
                            {search ? (
                              <span style={{fontFamily:'var(--mono)',fontSize:10.5,color:'var(--fg-3)',cursor:'pointer'}}
                                onClick={() => setSearch('')}>esc</span>
                            ) : (
                              <span style={{padding:'1px 5px',border:'1px solid var(--line)',borderRadius:3,
                                fontSize:10.5,fontFamily:'var(--mono)',color:'var(--fg-3)'}}>⌘K</span>
                            )}
                          </div>
                          <div className="seg">
                            <button className={view === 'page' ? 'active' : ''} onClick={() => setView('page')}>page</button>
                            <button className={view === 'all' ? 'active' : ''} onClick={() => setView('all')}>all</button>
                          </div>
                          {tab === 'labels' && (
                            <select className="dtf-locale-sel" value={labelLocale}
                              onChange={e => setLabelLocale(e.target.value)} title="Locale">
                              {LOCALES.map(l => (
                                <option key={l.code} value={l.code}>
                                  {l.flag} · {l.name}{l.pct < 100 ? ` (${l.pct}%)` : ''}
                                </option>
                              ))}
                            </select>
                          )}
                        </div>
                      )}

                      <div className="dtf-body">{bodyContent}</div>
                    </div>
                  </div>

                  <div className="dtf-foot">
                    {state === 'loading' ? (
                      <div className="stat-line">
                        <span style={{width:10,height:10,display:'inline-block',borderRadius:'50%',
                          border:'1.5px solid color-mix(in oklab, var(--accent) 22%, transparent)',
                          borderTopColor:'var(--accent)',
                          animation:'dtf-spin .9s linear infinite'}}/>
                        <span style={{color:'var(--fg-2)'}}>resolving 12 flags</span>
                      </div>
                    ) : null}
                    <div className="actions">
                      <button className="ibtn"
                        title="Build a URL that applies the current overrides for any visitor">
                        Copy share link
                      </button>
                      <button className="ibtn"
                        title="Persist current overrides to the address bar and reload">
                        Pin to URL
                      </button>
                      <span className="grow"/>
                      {overrides > 0 ? (
                        <button className="ibtn danger"
                          onClick={() => { setGates(DEFAULT_GATES); setExps(DEFAULT_EXPS); setConfigs(DEFAULT_CONFIGS); }}
                          title="Drop all session overrides">
                          Clear overrides
                        </button>
                      ) : null}
                      <button className="ibtn" title="Sign out of this project">Sign out</button>
                    </div>
                  </div>

                  {overrideTarget ? (
                    <OverrideModal row={overrideTarget}
                      onSave={onSaveOverride}
                      onClose={() => setOverrideTarget(null)}/>
                  ) : null}
                  {bugFormOpen ? (
                    <BugFormModal
                      onSubmit={(b) => setBugs(arr => [b, ...arr])}
                      onClose={() => setBugFormOpen(false)}/>
                  ) : null}
                  {featureFormOpen ? (
                    <FeatureFormModal
                      onSubmit={(f) => setFeatures(arr => [f, ...arr])}
                      onClose={() => setFeatureFormOpen(false)}/>
                  ) : null}
                </div>
              )}
            </div>

            {/* Right control panel for testing */}
            <div className="dtf-controls">
              <div className="h">
                <span className="d"/>
                <h3>Test panel</h3>
                <span className="sub">drive every state</span>
              </div>

              <div className="sec">
                <div className="lbl">Tab</div>
                <div className="opts">
                  {TABS.map(t => {
                    const Ic = t.icon;
                    const desc = ({user:'props · impersonate',gates:'flags & killswitches',exps:'A/B variants',
                      configs:'remote values', labels:'i18n strings',
                      feedback:'bugs + requests', events:'live stream'})[t.k];
                    return (
                      <button key={t.k} className={tab === t.k ? 'active' : ''}
                        onClick={() => { setTab(t.k); setExpanded(null); setState('live'); }}>
                        <span className="ic"><Ic size={11} style={{color:'currentColor'}}/></span>
                        <span style={{flex:1}}>{t.label}<span className="desc">{desc}</span></span>
                        {t.count != null ? <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--fg-4)'}}>{t.count}</span> : null}
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="sec">
                <div className="lbl">State</div>
                <div className="opts">
                  <button className={state === 'live' ? 'active' : ''} onClick={() => setState('live')}>
                    <span className="ic"><span style={{width:6,height:6,borderRadius:'50%',background:'var(--accent)',boxShadow:'0 0 6px var(--accent)'}}/></span>
                    <span style={{flex:1}}>Live<span className="desc">data, overrides, expand</span></span>
                  </button>
                  <button className={state === 'loading' ? 'active' : ''} onClick={() => setState('loading')}>
                    <span className="ic">⟳</span>
                    <span style={{flex:1}}>Loading<span className="desc">skeleton + topstrip</span></span>
                  </button>
                  <button className={state === 'empty-route' ? 'active' : ''} onClick={() => setState('empty-route')}>
                    <span className="ic">○</span>
                    <span style={{flex:1}}>Empty route<span className="desc">nothing fired</span></span>
                  </button>
                  <button onClick={() => { setSearch('checkout_v9'); setState('live'); }}>
                    <span className="ic">⌕</span>
                    <span style={{flex:1}}>No-match search<span className="desc">fills query "checkout_v9"</span></span>
                  </button>
                </div>
              </div>

              <div className="sec">
                <div className="lbl">Quick toggles</div>
                <div className="opts">
                  <button onClick={() => setCollapsed(c => !c)}>
                    <span className="ic">↔</span>
                    <span style={{flex:1}}>{collapsed ? 'Expand panel' : 'Collapse to rail'}<span className="desc">click rail to reopen</span></span>
                  </button>
                  <button onClick={() => onToggleGate('gate.beta_drop')}>
                    <span className="ic">⤢</span>
                    <span style={{flex:1}}>Force gate.beta_drop<span className="desc">creates an override badge</span></span>
                  </button>
                  <button onClick={() => onVariant('exp.checkout_v3', 'control')}>
                    <span className="ic">A/B</span>
                    <span style={{flex:1}}>Switch checkout_v3 → control<span className="desc">forces exp variant</span></span>
                  </button>
                  <button onClick={() => {
                    setGates(DEFAULT_GATES); setExps(DEFAULT_EXPS); setConfigs(DEFAULT_CONFIGS);
                    setUserState(DEFAULT_USER); setDirty({}); setSearch(''); setState('live');
                  }}>
                    <span className="ic">↺</span>
